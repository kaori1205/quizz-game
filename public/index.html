<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live!QUIZZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#FAFAFF; --panel:#FFFFFF; --panel-2:#F4F1FF; --line:rgba(36,27,77,0.10);
    --text:#241B4D; --text-dim:#6E6693; --primary:#8B5CF6; --primary-2:#A78BFA;
    --gold:#FFC93C; --teal:#12B886;
    --a-red:#FF4757; --a-blue:#1E90FF; --a-yellow:#FFC107; --a-green:#2ED573;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
  body{margin:0; position:relative; overflow-x:hidden; background:linear-gradient(135deg,#6D28D9 0%,#8B5CF6 45%,#A855F7 100%); color:var(--text); font-family:Arial,sans-serif; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:40px 16px; padding-top:max(40px, env(safe-area-inset-top)); padding-bottom:max(40px, env(safe-area-inset-bottom)); padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right));}
  body::before{content:"";position:fixed; top:-220px; right:-160px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.16), transparent 70%); pointer-events:none;}
  body::after{content:"";position:fixed; bottom:-260px; left:-200px; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle at 70% 70%, rgba(255,255,255,0.12), transparent 70%); pointer-events:none;}
  h1,h2,h3{font-family:Arial,sans-serif;}
  #app{width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; gap:18px; position:relative; z-index:1;}
  .brand{display:flex; align-items:center; gap:2px; margin-bottom:30px; cursor:pointer;}
  .brand .logo{width:44px;height:44px;border-radius:12px; background:#fff; box-shadow:0 4px 18px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; overflow:hidden; transform:rotate(-6deg); flex-shrink:0;}
  .brand .logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .brand span{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:clamp(24px,7vw,34px); letter-spacing:1px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.2);}
  .brand .letter{display:inline-block;}
  .brand .letter.bang{color:var(--gold); animation:bangPulse 1.3s ease-in-out infinite; text-shadow:0 0 10px rgba(255,201,60,.7), 0 2px 10px rgba(0,0,0,0.2); transform-origin:bottom center; will-change:transform;}
  @keyframes bangPulse{
    0%,60%,100%{transform:translateY(0) scale(1) rotate(0deg);}
    30%{transform:translateY(-9px) scale(1.25) rotate(8deg);}
  }
  @media (prefers-reduced-motion:reduce){
    .brand .letter.bang{animation:none;}
  }
  .card{width:100%; background:var(--panel); border:none; border-radius:var(--radius); padding:clamp(20px,6vw,32px) clamp(16px,5vw,28px); box-shadow:0 24px 48px -12px rgba(30,10,70,0.35);}
  .center{text-align:center;}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  button{font-family:Arial,sans-serif; font-weight:700; font-size:16px; border:none; border-radius:14px; cursor:pointer; padding:14px 20px; color:#241B4D; background:var(--gold); box-shadow:0 6px 0 0 #E0A800; transition:transform .12s,box-shadow .12s,opacity .12s;}
  button:hover{transform:translateY(-2px);}
  button:active{transform:translateY(2px); box-shadow:0 2px 0 0 #E0A800;}
  button:disabled{opacity:.45; cursor:not-allowed; transform:none; box-shadow:none;}
  button.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--line); box-shadow:none;}
  button.primary{background:var(--primary); color:#fff; box-shadow:0 6px 0 0 #6D3FE0;}
  button.primary:active{box-shadow:0 2px 0 0 #6D3FE0;}
  button.block{width:100%;}
  input{font-family:Arial,sans-serif; font-size:16px; color:var(--text); background:#F7F6FE; border:1px solid var(--line); border-radius:12px; padding:13px 14px; outline:none; width:100%;}
  input:focus{border-color:var(--primary-2);}
  label{font-size:13px; color:var(--text-dim); font-weight:600; margin-bottom:4px; display:block;}
  .role-pick{display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%;}
  .role-btn{border:none; border-radius:18px; padding:32px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; text-align:center; transition:transform .15s,box-shadow .15s; font-family:Arial,sans-serif; font-weight:700; font-size:19px;}
  .role-btn:hover{transform:translateY(-3px);}
  .role-btn:active{transform:translateY(2px);}
  .role-btn.host{background:linear-gradient(135deg,#8B5CF6,#6D28D9); color:#fff; box-shadow:0 8px 0 0 #5321A8;}
  .role-btn.host:active{box-shadow:0 3px 0 0 #5321A8;}
  .role-btn.player{background:linear-gradient(135deg,#FFD966,var(--gold)); color:#241B4D; box-shadow:0 8px 0 0 #E0A800;}
  .role-btn.player:active{box-shadow:0 3px 0 0 #E0A800;}
  .code-plaque{font-family:Arial,sans-serif; font-weight:700; font-size:clamp(28px,9vw,44px); letter-spacing:clamp(3px,1.5vw,8px); background:rgba(58,45,120,.16); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.4); border-radius:14px; padding:14px 10px; color:#1A1333; box-shadow:0 8px 22px rgba(20,10,50,.10), inset 0 1px 0 rgba(255,255,255,.3); word-break:break-all;}
  .badge{display:inline-flex; align-items:center; gap:6px; background:rgba(45,212,191,.14); color:var(--teal); border:1px solid rgba(45,212,191,.35); font-weight:600; font-size:13px; padding:5px 11px; border-radius:999px;}
  .badge.badge-dark{background:rgba(36,27,77,.85); color:#fff; border-color:rgba(255,255,255,.16); font-size:15px; padding:8px 16px; box-shadow:0 4px 14px rgba(0,0,0,0.2);}
  .badge.dim{background:rgba(169,164,217,.12); color:var(--text-dim); border-color:var(--line);}
  .player-chip{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:6px 12px 6px 6px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px;}
  .player-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; max-height:220px; overflow:auto;}
  .avatar{width:28px;height:28px;border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0;}
  .avatar.lg{width:56px;height:56px;font-size:20px;}
  .qr-box{background:#fff; padding:10px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; cursor:zoom-in; transition:transform .15s;}
  .qr-box:hover{transform:scale(1.03);}
  .qr-modal-overlay{position:fixed; inset:0; background:rgba(20,10,50,.75); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; cursor:zoom-out; padding:24px;}
  .qr-modal-box{background:#fff; padding:28px; border-radius:22px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:0 24px 48px rgba(0,0,0,.4);}
  .qr-modal-code{font-family:Arial,sans-serif; font-weight:700; font-size:22px; letter-spacing:6px; color:#241B4D;}

  /* ===== Host lobby card: compact code/QR (1/10) + dominant player list (9/10) ===== */
  .card.lobby-card{display:flex; flex-direction:column; min-height:clamp(420px,64vh,600px);}
  .lobby-top-row{flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; width:100%; flex-wrap:wrap; gap:16px;}
  .lobby-top-row .badge{flex-shrink:0;}
  .lobby-code-section{flex:0 0 auto; display:grid; grid-template-columns:auto auto; grid-template-rows:auto auto; justify-content:center; align-items:center; align-content:start; column-gap:clamp(18px,4.5vw,36px); row-gap:4px;}
  .lobby-code-label{font-size:12px; font-weight:600; color:var(--text-dim); text-align:center;}
  .lobby-code-section .code-plaque{justify-self:center; display:flex; align-items:center; justify-content:center; min-width:52px; min-height:52px; font-size:clamp(14px,3vw,18px); padding:6px 10px; letter-spacing:clamp(1px,0.6vw,3px);}
  .lobby-code-section .qr-box{justify-self:center; padding:5px;}
  .lobby-players-section{flex:1 1 0%; display:flex; flex-direction:column; min-height:0;}
  .lobby-players-section .player-list{flex:1; max-height:none; overflow:auto;}
  .icon-picker{display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:16px;}
  .icon-opt{aspect-ratio:1; border-radius:10px; border:2px solid var(--line); background:var(--panel-2); color:var(--text); display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer;}
  .icon-opt.active{border-color:var(--primary); background:var(--primary); color:#fff;}
  .tabs{display:flex; gap:8px; width:100%; margin-bottom:14px;}
  .tab-btn{flex:1; padding:11px; border-radius:12px; border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim); font-weight:700; cursor:pointer;}
  .tab-btn.active{background:var(--primary); color:#fff; border-color:var(--primary);}
  .qmeta{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .timer-ring{position:relative; width:72px; height:72px;}
  .timer-ring svg{width:72px; height:72px; transform:rotate(-90deg);}
  .timer-ring circle{fill:none; stroke-width:6;}
  .timer-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-weight:700; font-size:22px;}
  .question-text{font-family:Arial,sans-serif; font-size:clamp(18px,5vw,24px); font-weight:600; line-height:1.35; margin:6px 0 18px; word-break:break-word;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .opt{display:flex; align-items:center; gap:10px; border-radius:14px; padding:18px 16px; font-family:Arial,sans-serif; font-weight:700; font-size:16px; color:#fff; cursor:pointer; border:none; text-align:left; min-height:64px; transition:transform .12s,box-shadow .12s,opacity .12s;}
  .opt.red{background:var(--a-red); box-shadow:0 6px 0 0 #C23140;} .opt.blue{background:var(--a-blue); box-shadow:0 6px 0 0 #1560B0;} .opt.yellow{background:var(--a-yellow); box-shadow:0 6px 0 0 #C98600;} .opt.green{background:var(--a-green); box-shadow:0 6px 0 0 #1F9E5A;}
  .opt:not(:disabled):hover{transform:translateY(-2px);}
  .opt:not(:disabled):active{transform:translateY(4px); box-shadow:none !important;}
  .opt:disabled{opacity:.45; cursor:default; box-shadow:none;}
  .opt-logo{width:28px; height:28px; border-radius:9px; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 2px 6px rgba(0,0,0,.18);}
  .opt-logo span{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:16px; line-height:1; display:block;}
  .leader-row{display:flex; align-items:center; justify-content:space-between; background:rgba(58,45,120,.16); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.35); border-radius:12px; padding:12px 16px; margin-bottom:8px; animation:rowIn .5s ease both;}
  .leader-row.top1{background:linear-gradient(90deg,rgba(255,201,60,.28),rgba(255,201,60,.06)); border-color:rgba(255,201,60,.55); box-shadow:0 6px 16px rgba(255,201,60,.22);}
  .leader-row.top2{background:linear-gradient(90deg,rgba(148,163,184,.28),rgba(148,163,184,.06)); border-color:rgba(148,163,184,.5);}
  .leader-row.top3{background:linear-gradient(90deg,rgba(217,119,6,.24),rgba(217,119,6,.06)); border-color:rgba(217,119,6,.45);}
  @keyframes rowIn{from{opacity:0; transform:translateX(-28px);} to{opacity:1; transform:translateX(0);}}
  .rank-change{font-family:Arial,sans-serif; font-size:13px; font-weight:800; margin:0 6px; min-width:14px; text-align:center;}
  .rank-change.up{color:#22C55E;}
  .rank-change.down{color:#EF4444;}
  .rank-change.same{color:var(--text-dim); opacity:.5;}
  .leader-rank{font-family:Arial,sans-serif; font-weight:700; color:var(--text-dim); width:28px;}
  .leader-name{font-weight:600; flex:1; margin-left:6px;}
  .leader-score{font-family:Arial,sans-serif; font-weight:700; color:var(--gold);}
  .muted{color:var(--text-dim); font-size:14px;}
  .divider{height:1px; background:var(--line); margin:18px 0;}
  .result-banner{text-align:center; padding:18px; border-radius:14px; margin-bottom:16px; font-family:Arial,sans-serif; font-weight:700; font-size:20px;}
  .result-banner.ok{background:rgba(34,197,94,.14); color:#16A34A; border:1px solid rgba(34,197,94,.35);}
  .result-banner.no{background:rgba(255,71,87,.12); color:#DC2626; border:1px solid rgba(255,71,87,.35);}

  /* ===== Q&A card: question box = 1/3 height (dark blur box), answers = 3/5 height (fills area, each opt = 1/4), footer sized to content pinned at bottom ===== */
  .card.qa-card{display:flex; flex-direction:column; min-height:clamp(420px,70vh,640px);}
  .qa-question{flex:3 1 0%; display:flex; align-items:stretch; justify-content:center;}
  .question-box{width:100%; height:calc(100% - 20px); margin-bottom:20px; display:flex; align-items:center; justify-content:center; background:rgba(58,45,120,.16); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.4); border-radius:18px; padding:22px 24px; box-shadow:0 8px 22px rgba(20,10,50,.10), inset 0 1px 0 rgba(255,255,255,.3);}
  .question-box .question-text{width:100%; margin:0; color:#1A1333; text-align:center;}
  .qa-answers{flex:2 1 0%; display:flex; align-items:stretch;}
  .qa-answers .opts{width:100%; height:100%; grid-template-rows:1fr 1fr;}
  .qa-answers .opts .opt{height:100%; min-height:0;}
  .qa-footer{flex:0 0 auto; display:flex; flex-direction:column; justify-content:flex-end;}

  /* ===== Leaderboard card: footer (divider + action) pinned to bottom ===== */
  .card.lb-card{display:flex; flex-direction:column; min-height:clamp(420px,70vh,640px);}
  .lb-title{margin-top:0; text-transform:uppercase; font-size:clamp(20px,4.6vw,30px); letter-spacing:1px;}
  .lb-list{flex:1; overflow:auto; background:rgba(58,45,120,.34); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:12px; box-shadow:0 10px 28px rgba(20,10,50,.16);}
  .lb-list .muted{color:rgba(255,255,255,.72);}
  .lb-footer{margin-top:auto;}

  /* ===== Final results card: footer (divider + back button) pinned to bottom ===== */
  .card.ended-card{display:flex; flex-direction:column; min-height:clamp(420px,70vh,640px);}
  .ended-list{flex:1; overflow:auto;}
  .ended-footer{margin-top:auto;}

  /* ===== Responsive: tablets & small laptops ===== */
  @media (min-width:768px){
    #app{max-width:520px;}
  }

  /* ===== HOST LOBBY STAGE: pinned frame, fits viewport fully, no page scroll ===== */
  body.lobby-stage{height:100dvh; height:100vh; padding:0; overflow:hidden; display:flex; flex-direction:column; align-items:center;}
  body.lobby-stage .brand{margin:max(16px, env(safe-area-inset-top)) 0 14px 0; flex-shrink:0;}
  body.lobby-stage .brand .logo{width:36px; height:36px; border-radius:10px;}
  body.lobby-stage .brand span{font-size:18px;}
  body.lobby-stage #app{
    flex:1 1 auto;
    width:100%;
    max-width:none;
    min-height:0;
    margin:0;
    padding:0 16px max(50px, env(safe-area-inset-bottom)) 16px;
    display:flex;
  }
  body.lobby-stage .card.lobby-card{width:100%; height:100%; min-height:0; margin:0; overflow-y:auto;}
  @media (min-width:700px){
    body.lobby-stage #app{padding-left:100px; padding-right:100px;}
  }

  /* ===== Responsive: large screens (center content, avoid stretching) ===== */
  @media (min-width:1024px){
    #app{max-width:540px;}
    .question-text{font-size:clamp(22px,2.4vw,28px);}
  }

  /* ===== Responsive: small phones ===== */
  @media (max-width:380px){
    body{padding:24px 12px;}
    .card{padding:18px 14px;}
    .role-pick{grid-template-columns:1fr; gap:12px;}
    .role-btn{padding:22px 14px; font-size:17px;}
    .opts{grid-template-columns:1fr; gap:10px;}
    .opt{padding:14px 12px; min-height:52px; font-size:15px;}
    .icon-picker{grid-template-columns:repeat(4,1fr);}
    .avatar.lg{width:44px; height:44px; font-size:16px;}
    .timer-ring{width:52px; height:52px;}
    .timer-ring svg{width:52px; height:52px;}
    .code-plaque{letter-spacing:3px;}
    .card.qa-card, .card.lb-card, .card.ended-card{min-height:clamp(380px,72vh,600px);}
    .qa-answers .opts{grid-template-rows:repeat(4,1fr);}
    .question-box{padding:16px 16px;}
    .badge.badge-dark{font-size:13px; padding:6px 12px;}
  }

  /* ===== Responsive: very short viewports (landscape phones) ===== */
  @media (max-height:480px) and (orientation:landscape){
    body{padding:16px 16px; justify-content:flex-start;}
    #app{max-width:640px;}
    .card{padding:16px 20px;}
    .opts{grid-template-columns:1fr 1fr;}
    .card.qa-card, .card.lb-card, .card.ended-card{min-height:clamp(260px,82vh,420px);}
  }

  /* ===== Reduce decorative blobs on small screens to avoid clipping issues ===== */
  @media (max-width:480px){
    body::before{width:320px; height:320px; top:-140px; right:-120px;}
    body::after{width:380px; height:380px; bottom:-160px; left:-140px;}
  }

  /* ===== HOST STAGE MODE: card pinned to fixed offsets from the screen edges (no scroll, no drift) ===== */
  body.host-stage{height:100dvh; height:100vh; padding:0; overflow:hidden;}
  body.host-stage .brand{
    position:fixed;
    top:max(10px, env(safe-area-inset-top));
    left:max(10px, env(safe-area-inset-left));
    z-index:5; margin:0; gap:6px;
    background:rgba(36,27,77,.85);
    padding:6px 12px 6px 6px;
    border-radius:999px;
    box-shadow:0 6px 16px rgba(0,0,0,.28);
    backdrop-filter:blur(2px);
  }
  body.host-stage .brand .logo{width:32px; height:32px; border-radius:9px;}
  body.host-stage .brand span.title{font-size:12px; letter-spacing:0.5px;}
  body.host-stage #app{
    position:fixed;
    top:max(100px, env(safe-area-inset-top));
    right:max(50px, env(safe-area-inset-right));
    bottom:max(30px, env(safe-area-inset-bottom));
    left:max(50px, env(safe-area-inset-left));
    max-width:none; width:auto; height:auto; margin:0;
    display:flex; flex-direction:column; align-items:stretch; justify-content:flex-start; gap:0;
  }
  body.host-stage .card{width:100%; height:100%; padding:clamp(16px,2.6vh,32px) clamp(18px,3vw,40px); border-radius:26px; overflow-y:auto;}
  body.host-stage .qmeta{margin-bottom:clamp(8px,1.6vh,16px);}
  body.host-stage .badge{font-size:clamp(13px,1.6vh,17px); padding:6px 14px;}
  body.host-stage .badge.badge-dark{font-size:clamp(15px,1.9vh,20px); padding:8px 18px;}
  body.host-stage .timer-ring{width:clamp(54px,7.8vh,82px); height:clamp(54px,7.8vh,82px);}
  body.host-stage .timer-ring svg{width:100%; height:100%;}
  body.host-stage .timer-num{font-size:clamp(18px,2.5vh,27px);}
  body.host-stage .question-text{font-size:clamp(20px,3.4vh,34px); margin:clamp(8px,1.6vh,16px) 0 clamp(14px,2.4vh,24px); line-height:1.25;}
  body.host-stage .opts{gap:clamp(10px,1.6vh,18px);}
  body.host-stage .opt{min-height:clamp(52px,8vh,84px); font-size:clamp(15px,2vh,20px); padding:clamp(12px,1.8vh,20px) 18px; border-radius:16px; gap:12px;}
  body.host-stage .opt-logo{width:clamp(24px,3.4vh,34px); height:clamp(24px,3.4vh,34px);}
  body.host-stage .opt-logo span{font-size:clamp(14px,1.8vh,19px);}
  body.host-stage .opt:disabled{opacity:1;}
  body.host-stage .divider{margin:clamp(10px,1.6vh,18px) 0;}
  body.host-stage #answered-count{font-size:clamp(13px,1.6vh,16px); margin:clamp(8px,1.4vh,14px) 0;}
  body.host-stage #force-end, body.host-stage #next-question{font-size:clamp(14px,1.8vh,18px); padding:clamp(12px,1.8vh,16px) 24px;}
  body.host-stage h3.center{font-size:clamp(18px,2.6vh,26px); margin:0 0 clamp(8px,1.4vh,14px);}
  body.host-stage .leader-row{padding:clamp(10px,1.6vh,16px) 18px; border-radius:14px; font-size:clamp(14px,1.8vh,18px); margin-bottom:clamp(6px,1.2vh,10px);}
  body.host-stage .leader-rank{font-size:clamp(15px,1.8vh,20px); width:38px;}
  body.host-stage .avatar{width:clamp(28px,3.4vh,38px); height:clamp(28px,3.4vh,38px); font-size:clamp(12px,1.6vh,15px);}
  body.host-stage .leader-score{font-size:clamp(15px,1.8vh,20px);}
  body.host-stage .rank-change{font-size:clamp(12px,1.4vh,15px);}

  /* ===== Confetti + fireworks background effect (host results/ended) ===== */
  .fx-layer{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;}
  .confetti-piece{position:absolute; top:-24px; width:9px; height:15px; opacity:.95; border-radius:2px; animation-name:confettiFall; animation-timing-function:linear; animation-fill-mode:forwards;}
  @keyframes confettiFall{
    0%{transform:translateY(-10vh) rotate(0deg); opacity:1;}
    100%{transform:translateY(115vh) rotate(600deg); opacity:.4;}
  }
  .firework{position:absolute; width:0; height:0;}
  .firework .spark{position:absolute; width:6px; height:6px; border-radius:50%; left:0; top:0; animation:sparkFly .85s ease-out forwards;}
  @keyframes sparkFly{
    0%{transform:rotate(var(--angle)) translateX(0); opacity:1;}
    100%{transform:rotate(var(--angle)) translateX(90px); opacity:0;}
  }

  /* ===== Respect users who prefer reduced motion ===== */
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
    .leader-row{animation:none;}
    .confetti-piece, .firework .spark{animation:none; display:none;}
  }
</style>
</head>
<body>
<div class="brand" id="brand-home" role="button" tabindex="0" aria-label="Về trang chủ"><div class="logo"><img src="logo.jpg" alt="Live!QUIZZ logo" onerror="this.style.display='none'"></div><span class="title" aria-label="Live!QUIZZ"><span class="letter">L</span><span class="letter">i</span><span class="letter">v</span><span class="letter">e</span><span class="letter bang">!</span><span class="letter">Q</span><span class="letter">U</span><span class="letter">I</span><span class="letter">Z</span><span class="letter">Z</span></span></div>
<div class="fx-layer" id="fx-layer"></div>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const OPT_CLASSES = ["red","blue","yellow","green"];
const SHAPES = {
  red:`<span class="opt-logo"><span style="color:var(--a-red)">V</span></span>`,
  blue:`<span class="opt-logo"><span style="color:var(--a-blue)">V</span></span>`,
  yellow:`<span class="opt-logo"><span style="color:var(--a-yellow)">V</span></span>`,
  green:`<span class="opt-logo"><span style="color:var(--a-green)">V</span></span>`,
};
const ICON_OPTS = ["A","B","C","D","E","F","G","H","I","J","K","L"];

const urlParams = new URLSearchParams(location.search);
const joinCodeFromUrl = urlParams.get("join");

let state = { screen:"landing", role:null, code:"", totalQuestions:0, currentIndex:0,
  answered:false, lastCorrect:null, lastPoints:0, selectedIcon: ICON_OPTS[0], questionSets:[] };
let tickHandle = null;
let currentDuration = 20000, currentStart = 0;

function el(id){ return document.getElementById(id); }

function loadQuestionSets(){
  fetch("/api/question-sets")
    .then(r=>r.json())
    .then(list=>{
      state.questionSets = Array.isArray(list) ? list : [];
      if(state.screen==="host_setup") render();
    })
    .catch(()=>{ /* giữ danh sách rỗng, vẫn dùng được bộ mặc định */ });
}
function esc(s){ const d=document.createElement("div"); d.innerText=s; return d.innerHTML; }

function render(){
  const app = el("app");
  if(state.screen==="landing") app.innerHTML = viewLanding();
  else if(state.screen==="host_setup") app.innerHTML = viewHostSetup();
  else if(state.screen==="host_lobby") app.innerHTML = viewHostLobby();
  else if(state.screen==="host_question") app.innerHTML = viewQuestion(true);
  else if(state.screen==="host_results") app.innerHTML = viewResults(true);
  else if(state.screen==="host_ended") app.innerHTML = viewEnded();
  else if(state.screen==="player_join") app.innerHTML = viewPlayerJoin();
  else if(state.screen==="player_wait") app.innerHTML = viewPlayerWait();
  else if(state.screen==="player_question") app.innerHTML = viewQuestion(false);
  else if(state.screen==="player_results") app.innerHTML = viewResults(false);
  else if(state.screen==="player_ended") app.innerHTML = viewEnded();
  bind();
  if(state.screen==="host_lobby") renderQr();
  const isHostStage = state.screen==="host_question" || state.screen==="host_results" || state.screen==="host_ended";
  document.body.classList.toggle("host-stage", isHostStage);
  document.body.classList.toggle("lobby-stage", state.screen==="host_lobby");
  if(state.screen==="host_results" || state.screen==="host_ended") startCelebration();
  else clearFx();
}

function renderQr(){
  const box = el("qr-box");
  if(!box) return;
  box.innerHTML = "";
  const joinUrl = `${location.origin}${location.pathname}?join=${state.code}`;
  new QRCode(box, { text: joinUrl, width: 42, height: 42, colorDark:"#241B4D", colorLight:"#ffffff" });
  box.onclick = openQrModal;
}

function openQrModal(){
  const joinUrl = `${location.origin}${location.pathname}?join=${state.code}`;
  const overlay = document.createElement("div");
  overlay.className = "qr-modal-overlay";
  overlay.onclick = ()=> overlay.remove();
  const modalBox = document.createElement("div");
  modalBox.className = "qr-modal-box";
  modalBox.onclick = (e)=> e.stopPropagation();
  const codeLabel = document.createElement("div");
  codeLabel.className = "qr-modal-code";
  codeLabel.innerText = state.code;
  const qrHolder = document.createElement("div");
  modalBox.appendChild(codeLabel);
  modalBox.appendChild(qrHolder);
  overlay.appendChild(modalBox);
  document.body.appendChild(overlay);
  new QRCode(qrHolder, { text: joinUrl, width: 320, height: 320, colorDark:"#241B4D", colorLight:"#ffffff" });
}

// ---- Celebration effects (confetti + fireworks) ----
let fxInterval = null;
const FX_COLORS = ["#FFC93C","#8B5CF6","#12B886","#FF4757","#1E90FF","#2ED573"];
function clearFx(){
  if(fxInterval){ clearInterval(fxInterval); fxInterval = null; }
  const layer = el("fx-layer");
  if(layer) layer.innerHTML = "";
}
function startCelebration(){
  clearFx();
  const layer = el("fx-layer");
  if(!layer) return;
  spawnConfettiBurst(layer, 36);
  spawnFirework(layer);
  fxInterval = setInterval(()=>{
    spawnFirework(layer);
    if(Math.random()<0.4) spawnConfettiBurst(layer, 10);
  }, 1000);
}
function spawnConfettiBurst(layer, count){
  for(let i=0;i<count;i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random()*100+"%";
    piece.style.background = FX_COLORS[Math.floor(Math.random()*FX_COLORS.length)];
    piece.style.animationDuration = (2.4+Math.random()*2.2)+"s";
    piece.style.animationDelay = (Math.random()*0.8)+"s";
    piece.style.borderRadius = Math.random()<0.5 ? "50%" : "2px";
    layer.appendChild(piece);
    setTimeout(()=>piece.remove(), 5500);
  }
}
function spawnFirework(layer){
  const x = 8+Math.random()*84;
  const y = 12+Math.random()*38;
  const color = FX_COLORS[Math.floor(Math.random()*FX_COLORS.length)];
  const burst = document.createElement("div");
  burst.className = "firework";
  burst.style.left = x+"%";
  burst.style.top = y+"%";
  const sparkCount = 14;
  for(let i=0;i<sparkCount;i++){
    const spark = document.createElement("span");
    spark.className = "spark";
    spark.style.setProperty("--angle", (i/sparkCount*360)+"deg");
    spark.style.background = color;
    burst.appendChild(spark);
  }
  layer.appendChild(burst);
  setTimeout(()=>burst.remove(), 900);
}

function viewLanding(){
  return `<div class="card center"><h2 style="margin-top:0">Chào mừng!</h2>
  <p class="muted">Tạo phòng để làm host, hoặc tham gia bằng mã phòng.</p>
  <div class="role-pick">
    <div class="role-btn host" id="pick-host">Tạo phòng (Host)</div>
    <div class="role-btn player" id="pick-player">Tham gia chơi</div>
  </div>
  <button class="secondary block" id="pick-history" style="margin-top:14px">Lịch sử trận đấu</button>
  <button class="secondary block" id="pick-admin" style="margin-top:10px">Quản lý bộ câu hỏi</button>
  </div>`;
}
function viewHostSetup(){
  const sets = state.questionSets || [];
  const options = [`<option value="">Bộ mặc định (5 câu, 20s/câu)</option>`]
    .concat(sets.map(s=>`<option value="${s.id}">${esc(s.name)} — ${s.numQuestions} câu, ${s.duration}s/câu</option>`))
    .join("");
  return `<div class="card center"><h2 style="margin-top:0">Tạo phòng mới</h2>
  <p class="muted">Server sẽ sinh mã phòng tự động.</p>
  <div class="field" style="text-align:left; margin:16px 0;">
    <label style="display:block; font-weight:700; font-size:13px; margin-bottom:6px; color:var(--text-dim);">Chọn bộ câu hỏi</label>
    <select id="question-set-select" style="width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:15px; font-family:Arial,sans-serif; color:var(--text); background:#fff;">${options}</select>
  </div>
  <button class="primary block" id="create-room">Tạo phòng ngay</button>
  <button class="secondary block" id="back-landing" style="margin-top:10px">Về trang chủ</button>
  </div>`;
}
function viewHostLobby(){
  return `<div class="card center lobby-card">
  <div class="lobby-top-row">
    <div class="badge badge-dark">Đang mở phòng</div>
    <div class="lobby-code-section">
      <div class="lobby-code-label">Nhập mã để chơi</div>
      <div class="lobby-code-label">Quét mã để chơi</div>
      <div class="code-plaque">${state.code}</div>
      <div class="qr-box" id="qr-box"></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="lobby-players-section">
    <p class="muted" id="lobby-count">Đang chờ người chơi…</p>
    <div class="player-list" id="lobby-players"></div>
  </div>
  <div class="divider"></div>
  <button class="primary block" id="start-game">Bắt đầu</button>
  </div>`;
}
function viewQuestion(isHost){
  return `<div class="card qa-card">
  <div class="qmeta">
    <div class="badge badge-dark">Câu ${state.currentIndex+1}/${state.totalQuestions}</div>
    <div class="timer-ring"><svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="28" stroke="rgba(36,27,77,.10)"></circle>
      <circle id="ring" cx="32" cy="32" r="28" stroke="var(--gold)" stroke-dasharray="176" stroke-dashoffset="0" stroke-linecap="round"></circle>
    </svg><div class="timer-num" id="timer-num">--</div></div>
  </div>
  <div class="qa-question"><div class="question-box"><div class="question-text">${esc(state.question)}</div></div></div>
  <div class="qa-answers"><div class="opts">
    ${state.options.map((o,i)=>`<button class="opt ${OPT_CLASSES[i]}" data-choice="${i}" ${isHost||state.answered?"disabled":""} style="${isHost?"cursor:default":""}">${SHAPES[OPT_CLASSES[i]]}<span>${esc(o)}</span></button>`).join("")}
  </div></div>
  <div class="qa-footer">
  ${isHost
    ? `<div class="divider"></div><p class="muted center" id="answered-count">0 người đã trả lời</p><button class="primary block" id="force-end">Kết thúc câu hỏi ngay</button>`
    : `<div class="divider"></div><p class="muted center">${state.answered?"Đã gửi đáp án — chờ kết quả…":"Chọn một đáp án"}</p>`}
  </div>
  </div>`;
}
function viewResults(isHost){
  const banner = state.lastCorrect===null ? "" :
    state.lastCorrect ? `<div class="result-banner ok">Chính xác! +${state.lastPoints} điểm</div>`
                       : `<div class="result-banner no">Sai rồi! +0 điểm</div>`;
  return `<div class="card lb-card">
  ${isHost?"":banner}
  <h3 class="center lb-title">Bảng xếp hạng</h3>
  <div class="lb-list" id="leaderboard">${renderLeaderboard(state.leaderboard, state.prevRankMap)}</div>
  <div class="lb-footer">
  <div class="divider"></div>
  ${isHost
    ? `<button class="primary block" id="next-question">${state.currentIndex+1<state.totalQuestions?"Câu tiếp theo":"Kết thúc trò chơi"}</button>`
    : `<p class="muted center">Đang chờ host chuyển câu tiếp theo…</p>`}
  </div>
  </div>`;
}
function viewEnded(){
  return `<div class="card center ended-card"><h2 style="margin-top:0">Kết quả chung cuộc</h2>
  <div class="ended-list" id="leaderboard-final">${renderLeaderboard(state.leaderboard, state.prevRankMap)}</div>
  <div class="ended-footer">
    <div class="divider"></div>
    <button class="primary block" id="back-landing">Về trang chủ</button>
  </div>
  </div>`;
}
function viewPlayerJoin(){
  const codeLocked = !!joinCodeFromUrl;
  return `<div class="card"><h2 style="margin-top:0">Tham gia phòng</h2>
  <label>Mã phòng</label>
  <input id="join-code" placeholder="VD: 1234" maxlength="6" style="margin-bottom:14px" value="${esc(state.code||joinCodeFromUrl||"")}" ${codeLocked?"disabled":""}/>
  <label>Tên hiển thị</label><input id="join-name" placeholder="Biệt danh của bạn" maxlength="18" style="margin-bottom:16px"/>
  <label>Chọn icon nhân vật</label>
  <div class="icon-picker" id="icon-picker">
    ${ICON_OPTS.map(ic=>`<div class="icon-opt ${ic===state.selectedIcon?"active":""}" data-icon="${ic}">${ic}</div>`).join("")}
  </div>
  <p class="muted" id="join-error" style="color:#DC2626"></p>
  <button class="primary block" id="do-join">Tham gia ngay</button></div>`;
}
function viewPlayerWait(){
  return `<div class="card center"><div class="badge">Đã vào phòng ${state.code}</div>
  <div class="avatar lg" style="margin:18px auto 0">${esc(state.selectedIcon)}</div>
  <p class="muted" style="margin-top:14px">Đang chờ host bắt đầu trò chơi…</p></div>`;
}
function buildRankMap(list){
  const map = {};
  (list||[]).forEach((p,i)=>{ map[p.name] = i+1; });
  return map;
}
function rankIcon(rank){
  return rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":rank;
}
function renderLeaderboard(list, prevRankMap){
  if(!list || list.length===0) return `<p class="muted center">Chưa có người chơi nào.</p>`;
  return list.map((p,i)=>{
    const rank = i+1;
    const topClass = rank<=3 ? ` top${rank}` : "";
    const prevRank = prevRankMap ? prevRankMap[p.name] : null;
    let changeHtml = "";
    if(prevRank!=null){
      if(prevRank>rank) changeHtml = `<div class="rank-change up">▲</div>`;
      else if(prevRank<rank) changeHtml = `<div class="rank-change down">▼</div>`;
      else changeHtml = `<div class="rank-change same">–</div>`;
    }
    return `<div class="leader-row${topClass}" style="animation-delay:${(i*0.06).toFixed(2)}s">
      <div class="leader-rank">${rankIcon(rank)}</div>
      <div class="avatar" style="margin-right:8px">${esc(p.icon||p.name.slice(0,1).toUpperCase())}</div>
      <div class="leader-name">${esc(p.name)}</div>
      ${changeHtml}
      <div class="leader-score">${p.score}</div>
    </div>`;
  }).join("");
}

function bind(){
  const b=(id,fn)=>{ const n=el(id); if(n) n.onclick=fn; };
  b("pick-host", ()=>{ state.screen="host_setup"; render(); loadQuestionSets(); });
  b("pick-player", ()=>{ state.screen="player_join"; render(); });
  b("pick-history", ()=>{ location.href="/history.html"; });
  b("pick-admin", ()=>{ location.href="/admin.html"; });
  b("back-landing", ()=>{ location.href = location.pathname; });
  const brandEl = el("brand-home");
  if(brandEl){
    brandEl.onclick = ()=>{ location.href = location.pathname; };
    brandEl.onkeydown = (e)=>{ if(e.key==="Enter" || e.key===" "){ e.preventDefault(); location.href = location.pathname; } };
  }
  document.querySelectorAll(".icon-opt").forEach(node=>{
    node.onclick=()=>{
      state.selectedIcon = node.dataset.icon;
      document.querySelectorAll(".icon-opt").forEach(n=>n.classList.toggle("active", n===node));
    };
  });
  b("create-room", ()=>{
    const sel = el("question-set-select");
    const questionSetId = sel && sel.value ? sel.value : undefined;
    socket.emit("host:create", { questionSetId }, (res)=>{
      if(!res.ok) return;
      state.role="host"; state.code=res.code; state.totalQuestions=res.totalQuestions;
      state.screen="host_lobby"; render();
    });
  });
  b("start-game", ()=> socket.emit("host:start"));
  b("force-end", ()=> socket.emit("host:endQuestion"));
  b("next-question", ()=> socket.emit("host:next"));
  b("do-join", ()=>{
    const code=(el("join-code").value||"").trim();
    const name=(el("join-name").value||"").trim();
    const err=el("join-error"); err.innerText="";
    if(!code||!name){ err.innerText="Nhập đầy đủ mã phòng và tên."; return; }
    socket.emit("player:join", {code, name, icon: state.selectedIcon}, (res)=>{
      if(!res.ok){ err.innerText=res.error; return; }
      state.role="player"; state.code=code; state.totalQuestions=res.totalQuestions;
      state.screen="player_wait"; render();
    });
  });
  document.querySelectorAll(".opt[data-choice]").forEach(btn=>{
    btn.onclick=()=>{
      if(state.role!=="player" || state.answered) return;
      state.answered=true;
      document.querySelectorAll(".opt[data-choice]").forEach(x=>x.disabled=true);
      socket.emit("player:answer", { choice: parseInt(btn.dataset.choice) });
    };
  });
}

function startTimerLoop(){
  if(tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(()=>{
    const remaining = currentStart + currentDuration - Date.now();
    const numEl = el("timer-num"), ring = el("ring");
    const secs = Math.max(0, Math.ceil(remaining/1000));
    if(numEl) numEl.innerText = secs;
    if(ring){
      const frac = Math.max(0, Math.min(1, remaining/currentDuration));
      ring.setAttribute("stroke-dashoffset", String(176*(1-frac)));
    }
    if(remaining<=0) clearInterval(tickHandle);
  }, 250);
}

// ---- Socket events ----
socket.on("lobby:update", ({players})=>{
  const c = el("lobby-count"); if(c) c.innerText = players.length? `${players.length} người đã tham gia` : "Đang chờ người chơi…";
  const l = el("lobby-players"); if(l) l.innerHTML = players.map(p=>`<div class="player-chip"><div class="avatar">${esc(p.icon||p.name.slice(0,1).toUpperCase())}</div>${esc(p.name)}</div>`).join("");
});

socket.on("game:question", (data)=>{
  state.currentIndex = data.index; state.totalQuestions = data.total;
  state.question = data.question; state.options = data.options;
  state.answered = false; state.lastCorrect = null; state.lastPoints = 0;
  currentStart = data.startTime; currentDuration = data.duration;
  state.screen = state.role==="host" ? "host_question" : "player_question";
  render();
  startTimerLoop();
});

socket.on("answer:ack", ({correct, points})=>{
  state.lastCorrect = correct; state.lastPoints = points;
});

socket.on("answer:count", ({answered,total})=>{
  const c = el("answered-count"); if(c) c.innerText = `${answered}/${total} người đã trả lời`;
});

socket.on("game:results", ({leaderboard})=>{
  state.prevRankMap = buildRankMap(state.leaderboard);
  state.leaderboard = leaderboard;
  state.screen = state.role==="host" ? "host_results" : "player_results";
  render();
});

socket.on("game:ended", ({leaderboard, gameId})=>{
  state.prevRankMap = buildRankMap(state.leaderboard);
  state.leaderboard = leaderboard;
  state.gameId = gameId;
  state.screen = state.role==="host" ? "host_ended" : "player_ended";
  render();
});

if(joinCodeFromUrl){
  state.code = joinCodeFromUrl;
  state.screen = "player_join";
}
render();
</script>
</body>
</html>
