<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đấu Trường Tri Thức — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12102B; --panel:#1E1B4B; --panel-2:#262261; --line:rgba(255,255,255,0.08);
    --text:#F4F2FF; --text-dim:#A9A4D9; --primary:#7C5CFC; --primary-2:#9B7FFF;
    --gold:#FFC93C; --teal:#2DD4BF;
    --a-red:#E5484D; --a-blue:#3B82F6; --a-yellow:#EAB308; --a-green:#22C55E;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:radial-gradient(1200px 600px at 50% -10%, #29236b 0%, var(--bg) 60%); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px;}
  h1,h2,h3{font-family:'Fredoka',sans-serif;}
  #app{width:100%; max-width:720px; display:flex; flex-direction:column; align-items:center; gap:18px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .logo{width:34px;height:34px;border-radius:9px; background:conic-gradient(from 220deg,var(--a-red),var(--a-yellow),var(--a-green),var(--a-blue),var(--a-red)); box-shadow:0 0 22px rgba(124,92,252,0.55);}
  .brand span{font-family:'Fredoka'; font-weight:700; font-size:20px;}
  .card{width:100%; background:linear-gradient(180deg,var(--panel),var(--panel-2)); border:1px solid var(--line); border-radius:var(--radius); padding:28px; box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);}
  .center{text-align:center;}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  button{font-family:'Fredoka'; font-weight:600; font-size:16px; border:none; border-radius:12px; cursor:pointer; padding:14px 20px; color:#12102B; background:var(--gold); transition:transform .12s,box-shadow .12s,opacity .12s;}
  button:hover{transform:translateY(-2px);}
  button:disabled{opacity:.45; cursor:not-allowed; transform:none;}
  button.secondary{background:transparent; color:var(--text); border:1px solid var(--line);}
  button.primary{background:var(--primary); color:#fff;}
  button.block{width:100%;}
  input{font-family:'Inter'; font-size:16px; color:var(--text); background:rgba(0,0,0,.25); border:1px solid var(--line); border-radius:12px; padding:13px 14px; outline:none; width:100%;}
  input:focus{border-color:var(--primary-2);}
  label{font-size:13px; color:var(--text-dim); font-weight:600; margin-bottom:4px; display:block;}
  .role-pick{display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%;}
  .role-btn{background:var(--panel-2); border:1px solid var(--line); border-radius:16px; padding:26px 16px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; color:var(--text);}
  .role-btn:hover{border-color:var(--primary-2); transform:translateY(-2px);}
  .role-btn .emoji{font-size:32px;}
  .code-plaque{font-family:'Fredoka'; font-weight:700; font-size:44px; letter-spacing:8px; background:rgba(0,0,0,.3); border:1px dashed var(--primary-2); border-radius:14px; padding:14px 10px; color:var(--gold);}
  .badge{display:inline-flex; align-items:center; gap:6px; background:rgba(45,212,191,.14); color:var(--teal); border:1px solid rgba(45,212,191,.35); font-weight:600; font-size:13px; padding:5px 11px; border-radius:999px;}
  .badge.dim{background:rgba(169,164,217,.12); color:var(--text-dim); border-color:var(--line);}
  .player-chip{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:8px 12px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .player-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; max-height:180px; overflow:auto;}
  .qmeta{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .timer-ring{position:relative; width:64px; height:64px;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring circle{fill:none; stroke-width:6;}
  .timer-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Fredoka'; font-weight:700; font-size:20px;}
  .question-text{font-family:'Fredoka'; font-size:24px; font-weight:600; line-height:1.35; margin:6px 0 18px;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .opt{display:flex; align-items:center; gap:10px; border-radius:14px; padding:18px 16px; font-family:'Fredoka'; font-weight:600; font-size:16px; color:#fff; cursor:pointer; border:none; text-align:left; min-height:64px;}
  .opt.red{background:var(--a-red);} .opt.blue{background:var(--a-blue);} .opt.yellow{background:var(--a-yellow);} .opt.green{background:var(--a-green);}
  .opt:disabled{opacity:.5; cursor:default;}
  .leader-row{display:flex; align-items:center; justify-content:space-between; background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:12px 16px; margin-bottom:8px;}
  .leader-rank{font-family:'Fredoka'; font-weight:700; color:var(--text-dim); width:28px;}
  .leader-name{font-weight:600; flex:1; margin-left:6px;}
  .leader-score{font-family:'Fredoka'; font-weight:700; color:var(--gold);}
  .muted{color:var(--text-dim); font-size:14px;}
  .divider{height:1px; background:var(--line); margin:18px 0;}
  .result-banner{text-align:center; padding:18px; border-radius:14px; margin-bottom:16px; font-family:'Fredoka'; font-weight:700; font-size:20px;}
  .result-banner.ok{background:rgba(34,197,94,.15); color:#4ADE80; border:1px solid rgba(34,197,94,.4);}
  .result-banner.no{background:rgba(229,72,77,.15); color:#F87171; border:1px solid rgba(229,72,77,.4);}
</style>
</head>
<body>
<div class="brand"><div class="logo"></div><span>Đấu Trường Tri Thức — Live</span></div>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const OPT_CLASSES = ["red","blue","yellow","green"];
const SHAPES = {
  red:`<svg width="20" height="20" viewBox="0 0 20 20"><polygon points="10,2 18,18 2,18" fill="#fff"/></svg>`,
  blue:`<svg width="20" height="20" viewBox="0 0 20 20"><polygon points="10,1 19,10 10,19 1,10" fill="#fff"/></svg>`,
  yellow:`<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="#fff"/></svg>`,
  green:`<svg width="20" height="20" viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="3" fill="#fff"/></svg>`,
};

let state = { screen:"landing", role:null, code:"", totalQuestions:0, currentIndex:0,
  answered:false, lastCorrect:null, lastPoints:0 };
let tickHandle = null;
let currentDuration = 20000, currentStart = 0;

function el(id){ return document.getElementById(id); }
function esc(s){ const d=document.createElement("div"); d.innerText=s; return d.innerHTML; }

function render(){
  const app = el("app");
  if(state.screen==="landing") app.innerHTML = viewLanding();
  else if(state.screen==="host_setup") app.innerHTML = viewHostSetup();
  else if(state.screen==="host_lobby") app.innerHTML = viewHostLobby();
  else if(state.screen==="host_question") app.innerHTML = viewQuestion(true);
  else if(state.screen==="host_results") app.innerHTML = viewResults(true);
  else if(state.screen==="host_ended") app.innerHTML = viewEnded();
  else if(state.screen==="player_join") app.innerHTML = viewPlayerJoin();
  else if(state.screen==="player_wait") app.innerHTML = viewPlayerWait();
  else if(state.screen==="player_question") app.innerHTML = viewQuestion(false);
  else if(state.screen==="player_results") app.innerHTML = viewResults(false);
  else if(state.screen==="player_ended") app.innerHTML = viewEnded();
  bind();
}

function viewLanding(){
  return `<div class="card center"><h2 style="margin-top:0">Chào mừng!</h2>
  <p class="muted">Tạo phòng để làm host, hoặc tham gia bằng mã phòng.</p>
  <div class="role-pick">
    <div class="role-btn" id="pick-host"><div class="emoji">🎛️</div><b>Tạo phòng (Host)</b><small>Điều khiển game</small></div>
    <div class="role-btn" id="pick-player"><div class="emoji">🙋</div><b>Tham gia chơi</b><small>Nhập mã & thi đấu</small></div>
  </div>
  <a href="/history.html" style="text-decoration:none"><button class="secondary block" style="margin-top:14px">📜 Lịch sử trận đấu</button></a>
  </div>`;
}
function viewHostSetup(){
  return `<div class="card center"><h2 style="margin-top:0">Tạo phòng mới</h2>
  <p class="muted">Server sẽ sinh mã phòng tự động.</p>
  <button class="primary block" id="create-room">Tạo phòng ngay</button></div>`;
}
function viewHostLobby(){
  return `<div class="card center">
  <div class="badge">🟢 Đang mở phòng</div>
  <h3 style="margin:10px 0 4px">Mọi người vào bằng mã:</h3>
  <div class="code-plaque">${state.code}</div>
  <p class="muted" id="lobby-count" style="margin-top:14px">Đang chờ người chơi…</p>
  <div class="player-list" id="lobby-players"></div>
  <div class="divider"></div>
  <button class="primary block" id="start-game">▶️ Bắt đầu (${state.totalQuestions} câu)</button>
  </div>`;
}
function viewQuestion(isHost){
  return `<div class="card">
  <div class="qmeta">
    <div class="badge">Câu ${state.currentIndex+1}/${state.totalQuestions}</div>
    <div class="timer-ring"><svg width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,.12)"></circle>
      <circle id="ring" cx="32" cy="32" r="28" stroke="var(--gold)" stroke-dasharray="176" stroke-dashoffset="0" stroke-linecap="round"></circle>
    </svg><div class="timer-num" id="timer-num">--</div></div>
  </div>
  <div class="question-text">${esc(state.question)}</div>
  <div class="opts">
    ${state.options.map((o,i)=>`<button class="opt ${OPT_CLASSES[i]}" data-choice="${i}" ${isHost||state.answered?"disabled":""} style="${isHost?"cursor:default":""}">${SHAPES[OPT_CLASSES[i]]}<span>${esc(o)}</span></button>`).join("")}
  </div>
  ${isHost
    ? `<div class="divider"></div><p class="muted center" id="answered-count">0 người đã trả lời</p><button class="primary block" id="force-end">⏭️ Kết thúc câu hỏi ngay</button>`
    : `<p class="muted center" style="margin-top:14px">${state.answered?"✅ Đã gửi đáp án — chờ kết quả…":"Chọn một đáp án"}</p>`}
  </div>`;
}
function viewResults(isHost){
  const banner = state.lastCorrect===null ? "" :
    state.lastCorrect ? `<div class="result-banner ok">🎉 Chính xác! +${state.lastPoints} điểm</div>`
                       : `<div class="result-banner no">❌ Sai rồi! +0 điểm</div>`;
  return `<div class="card">
  ${isHost?"":banner}
  <h3 style="margin-top:0" class="center">📊 Bảng xếp hạng</h3>
  <div id="leaderboard">${renderLeaderboard(state.leaderboard)}</div>
  <div class="divider"></div>
  ${isHost
    ? `<button class="primary block" id="next-question">${state.currentIndex+1<state.totalQuestions?"➡️ Câu tiếp theo":"🏁 Kết thúc trò chơi"}</button>`
    : `<p class="muted center">Đang chờ host chuyển câu tiếp theo…</p>`}
  </div>`;
}
function viewEnded(){
  const reportBtn = state.gameId
    ? `<a href="/api/games/${state.gameId}/report.csv" style="text-decoration:none"><button class="primary block">📥 Tải báo cáo chi tiết (CSV)</button></a>`
    : "";
  return `<div class="card center"><h2 style="margin-top:0">🏁 Kết quả chung cuộc</h2>
  <div id="leaderboard-final">${renderLeaderboard(state.leaderboard)}</div>
  <div class="divider"></div>
  ${reportBtn}
  <button class="secondary block" id="back-landing" style="margin-top:10px">Về trang chủ</button></div>`;
}
function viewPlayerJoin(){
  return `<div class="card"><h2 style="margin-top:0">Tham gia phòng</h2>
  <label>Mã phòng</label><input id="join-code" placeholder="VD: 1234" maxlength="6" style="margin-bottom:14px"/>
  <label>Tên hiển thị</label><input id="join-name" placeholder="Biệt danh của bạn" maxlength="18" style="margin-bottom:16px"/>
  <p class="muted" id="join-error" style="color:#F87171"></p>
  <button class="primary block" id="do-join">Tham gia ngay</button></div>`;
}
function viewPlayerWait(){
  return `<div class="card center"><div class="badge">✅ Đã vào phòng ${state.code}</div>
  <p class="muted" style="margin-top:14px">Đang chờ host bắt đầu trò chơi…</p>
  <div style="font-size:38px; margin-top:10px">⏳</div></div>`;
}
function renderLeaderboard(list){
  if(!list || list.length===0) return `<p class="muted center">Chưa có người chơi nào.</p>`;
  const medals=["🥇","🥈","🥉"];
  return list.map((p,i)=>`<div class="leader-row"><div class="leader-rank">${medals[i]||(i+1)}</div><div class="leader-name">${esc(p.name)}</div><div class="leader-score">${p.score}</div></div>`).join("");
}

function bind(){
  const b=(id,fn)=>{ const n=el(id); if(n) n.onclick=fn; };
  b("pick-host", ()=>{ state.screen="host_setup"; render(); });
  b("pick-player", ()=>{ state.screen="player_join"; render(); });
  b("back-landing", ()=>{ location.reload(); });
  b("create-room", ()=>{
    socket.emit("host:create", {}, (res)=>{
      if(!res.ok) return;
      state.role="host"; state.code=res.code; state.totalQuestions=res.totalQuestions;
      state.screen="host_lobby"; render();
    });
  });
  b("start-game", ()=> socket.emit("host:start"));
  b("force-end", ()=> socket.emit("host:endQuestion"));
  b("next-question", ()=> socket.emit("host:next"));
  b("do-join", ()=>{
    const code=(el("join-code").value||"").trim();
    const name=(el("join-name").value||"").trim();
    const err=el("join-error"); err.innerText="";
    if(!code||!name){ err.innerText="Vui lòng nhập đầy đủ mã phòng và tên."; return; }
    socket.emit("player:join", {code,name}, (res)=>{
      if(!res.ok){ err.innerText=res.error; return; }
      state.role="player"; state.code=code; state.totalQuestions=res.totalQuestions;
      state.screen="player_wait"; render();
    });
  });
  document.querySelectorAll(".opt[data-choice]").forEach(btn=>{
    btn.onclick=()=>{
      if(state.role!=="player" || state.answered) return;
      state.answered=true;
      document.querySelectorAll(".opt[data-choice]").forEach(x=>x.disabled=true);
      socket.emit("player:answer", { choice: parseInt(btn.dataset.choice) });
    };
  });
}

function startTimerLoop(){
  if(tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(()=>{
    const remaining = currentStart + currentDuration - Date.now();
    const numEl = el("timer-num"), ring = el("ring");
    const secs = Math.max(0, Math.ceil(remaining/1000));
    if(numEl) numEl.innerText = secs;
    if(ring){
      const frac = Math.max(0, Math.min(1, remaining/currentDuration));
      ring.setAttribute("stroke-dashoffset", String(176*(1-frac)));
    }
    if(remaining<=0) clearInterval(tickHandle);
  }, 250);
}

// ---- Socket events ----
socket.on("lobby:update", ({players})=>{
  const c = el("lobby-count"); if(c) c.innerText = players.length? `🎉 ${players.length} người đã tham gia` : "Đang chờ người chơi…";
  const l = el("lobby-players"); if(l) l.innerHTML = players.map(n=>`<div class="player-chip">🙋 ${esc(n)}</div>`).join("");
});

socket.on("game:question", (data)=>{
  state.currentIndex = data.index; state.totalQuestions = data.total;
  state.question = data.question; state.options = data.options;
  state.answered = false; state.lastCorrect = null; state.lastPoints = 0;
  currentStart = data.startTime; currentDuration = data.duration;
  state.screen = state.role==="host" ? "host_question" : "player_question";
  render();
  startTimerLoop();
});

socket.on("answer:ack", ({correct, points})=>{
  state.lastCorrect = correct; state.lastPoints = points;
});

socket.on("answer:count", ({answered,total})=>{
  const c = el("answered-count"); if(c) c.innerText = `${answered}/${total} người đã trả lời`;
});

socket.on("game:results", ({leaderboard})=>{
  state.leaderboard = leaderboard;
  state.screen = state.role==="host" ? "host_results" : "player_results";
  render();
});

socket.on("game:ended", ({leaderboard, gameId})=>{
  state.leaderboard = leaderboard;
  state.gameId = gameId;
  state.screen = state.role==="host" ? "host_ended" : "player_ended";
  render();
});

render();
</script>
</body>
</html>
