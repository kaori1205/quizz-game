<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live!QUIZZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#FAFAFF; --panel:#FFFFFF; --panel-2:#F4F1FF; --line:rgba(36,27,77,0.10);
    --text:#241B4D; --text-dim:#6E6693; --primary:#8B5CF6; --primary-2:#A78BFA;
    --gold:#FFC93C; --teal:#12B886;
    --a-red:#FF4757; --a-blue:#1E90FF; --a-yellow:#FFC107; --a-green:#2ED573;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  .audio-toggle{position:fixed; top:14px; right:14px; z-index:50; width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,.35); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);}
  .audio-toggle:hover{background:rgba(0,0,0,.5);}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
  body{margin:0; position:relative; overflow-x:hidden; background:linear-gradient(135deg,#6D28D9 0%,#8B5CF6 45%,#A855F7 100%); color:var(--text); font-family:Arial,sans-serif; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:40px 16px; padding-top:max(40px, env(safe-area-inset-top)); padding-bottom:max(40px, env(safe-area-inset-bottom)); padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right));}
  body::before{content:"";position:fixed; top:-220px; right:-160px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.16), transparent 70%); pointer-events:none;}
  body::after{content:"";position:fixed; bottom:-260px; left:-200px; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle at 70% 70%, rgba(255,255,255,0.12), transparent 70%); pointer-events:none;}
  h1,h2,h3{font-family:Arial,sans-serif;}
  #app{width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; gap:18px; position:relative; z-index:1;}
  .brand{display:flex; align-items:center; gap:2px; margin-bottom:30px; cursor:pointer;}
  .brand .logo{width:44px;height:44px;border-radius:12px; background:#fff; box-shadow:0 4px 18px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; overflow:hidden; transform:rotate(-6deg); flex-shrink:0;}
  .brand .logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .brand span{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:clamp(24px,7vw,34px); letter-spacing:1px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.2);}
  .brand .letter{display:inline-block;}
  .brand .letter.bang{color:var(--gold); animation:bangPulse 1.3s ease-in-out infinite; text-shadow:0 0 10px rgba(255,201,60,.7), 0 2px 10px rgba(0,0,0,0.2); transform-origin:bottom center; will-change:transform;}
  @keyframes bangPulse{
    0%,60%,100%{transform:translateY(0) scale(1) rotate(0deg);}
    30%{transform:translateY(-9px) scale(1.25) rotate(8deg);}
  }
  @media (prefers-reduced-motion:reduce){
    .brand .letter.bang{animation:none;}
  }
  .card{width:100%; background:var(--panel); border:none; border-radius:var(--radius); padding:clamp(20px,6vw,32px) clamp(16px,5vw,28px); box-shadow:0 24px 48px -12px rgba(30,10,70,0.35);}
  .center{text-align:center;}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  button{font-family:Arial,sans-serif; font-weight:700; font-size:16px; border:none; border-radius:14px; cursor:pointer; padding:14px 20px; color:#241B4D; background:var(--gold); box-shadow:0 6px 0 0 #E0A800; transition:transform .12s,box-shadow .12s,opacity .12s;}
  button:hover{transform:translateY(-2px);}
  button:active{transform:translateY(2px); box-shadow:0 2px 0 0 #E0A800;}
  button:disabled{opacity:.45; cursor:not-allowed; transform:none; box-shadow:none;}
  button.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--line); box-shadow:none;}
  button.primary{background:var(--primary); color:#fff; box-shadow:0 6px 0 0 #6D3FE0;}
  button.primary:active{box-shadow:0 2px 0 0 #6D3FE0;}
  button.block{width:100%;}
  input{font-family:Arial,sans-serif; font-size:16px; color:var(--text); background:#F7F6FE; border:1px solid var(--line); border-radius:12px; padding:13px 14px; outline:none; width:100%;}
  input:focus{border-color:var(--primary-2);}
  label{font-size:13px; color:var(--text-dim); font-weight:600; margin-bottom:4px; display:block;}
  .role-pick{display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%;}
  .role-btn{border:none; border-radius:18px; padding:32px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; text-align:center; transition:transform .15s,box-shadow .15s; font-family:Arial,sans-serif; font-weight:700; font-size:19px;}
  .role-btn:hover{transform:translateY(-3px);}
  .role-btn:active{transform:translateY(2px);}
  .role-btn.host{background:linear-gradient(135deg,#8B5CF6,#6D28D9); color:#fff; box-shadow:0 8px 0 0 #5321A8;}
  .role-btn.host:active{box-shadow:0 3px 0 0 #5321A8;}
  .role-btn.player{background:linear-gradient(135deg,#FFD966,var(--gold)); color:#241B4D; box-shadow:0 8px 0 0 #E0A800;}
  .role-btn.player:active{box-shadow:0 3px 0 0 #E0A800;}
  .code-plaque{font-family:Arial,sans-serif; font-weight:700; font-size:clamp(28px,9vw,44px); letter-spacing:clamp(3px,1.5vw,8px); background:rgba(58,45,120,.16); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.4); border-radius:14px; padding:14px 10px; color:#1A1333; box-shadow:0 8px 22px rgba(20,10,50,.10), inset 0 1px 0 rgba(255,255,255,.3); word-break:break-all;}
  .badge{display:inline-flex; align-items:center; gap:6px; background:rgba(45,212,191,.14); color:var(--teal); border:1px solid rgba(45,212,191,.35); font-weight:600; font-size:13px; padding:5px 11px; border-radius:999px;}
  .badge.badge-dark{background:rgba(36,27,77,.85); color:#fff; border-color:rgba(255,255,255,.16); font-size:15px; padding:8px 16px; box-shadow:0 4px 14px rgba(0,0,0,0.2);}
  .badge.dim{background:rgba(169,164,217,.12); color:var(--text-dim); border-color:var(--line);}
  .player-chip{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:6px 12px 6px 6px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; flex:0 0 auto; align-self:flex-start;}
  .player-list{display:flex; flex-wrap:wrap; align-content:flex-start; align-items:flex-start; gap:8px; margin-top:14px; max-height:220px; overflow:auto;}
  .avatar{width:28px;height:28px;border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; overflow:hidden; border:2px solid #052699;}
  .avatar img{width:100%; height:100%; object-fit:cover; display:block;}
  .avatar.lg{width:56px;height:56px;font-size:20px; border:3px solid #052699;}
  .qr-box{background:#fff; padding:10px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; cursor:zoom-in; transition:transform .15s;}
  .qr-box:hover{transform:scale(1.03);}
  .qr-modal-overlay{position:fixed; inset:0; background:rgba(20,10,50,.75); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; cursor:zoom-out; padding:24px;}
  .qr-modal-box{background:#fff; padding:28px; border-radius:22px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:0 24px 48px rgba(0,0,0,.4);}
  .qr-modal-code{font-family:Arial,sans-serif; font-weight:700; font-size:22px; letter-spacing:6px; color:#241B4D;}

  /* ===== Host lobby card: compact code/QR (1/10) + dominant player list (9/10) ===== */
  .card.lobby-card{display:flex; flex-direction:column; min-height:clamp(420px,64vh,600px);}
  .lobby-top-row{flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; width:100%; flex-wrap:wrap; gap:16px;}
  .lobby-top-row .badge{flex-shrink:0;}
  .lobby-code-section{flex:0 0 auto; display:grid; grid-template-columns:auto auto; grid-template-rows:auto auto; justify-content:center; align-items:center; align-content:start; column-gap:clamp(18px,4.5vw,36px); row-gap:4px;}
  .lobby-code-label{font-size:12px; font-weight:600; color:var(--text-dim); text-align:center;}
  .lobby-code-section .code-plaque{justify-self:center; display:flex; align-items:center; justify-content:center; min-width:52px; min-height:52px; font-size:clamp(14px,3vw,18px); padding:6px 10px; letter-spacing:clamp(1px,0.6vw,3px);}
  .lobby-code-section .qr-box{justify-self:center; padding:5px;}
  .lobby-players-section{flex:1 1 0%; display:flex; flex-direction:column; min-height:0;}
  .lobby-players-section .player-list{flex:1; max-height:none; overflow:auto;}
  .icon-picker{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:16px;}
  .icon-opt{aspect-ratio:1; border-radius:10px; border:2px solid var(--line); background:var(--panel-2); color:var(--text); display:flex; align-items:center; justify-content:center; font-weight:700; cursor:pointer; overflow:hidden; padding:3px;}
  .icon-opt img{width:100%; height:100%; object-fit:cover; border-radius:7px; display:block; pointer-events:none;}
  .icon-opt.active{border-color:var(--primary); background:var(--primary); color:#fff;}
  .tabs{display:flex; gap:8px; width:100%; margin-bottom:14px;}
  .tab-btn{flex:1; padding:11px; border-radius:12px; border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim); font-weight:700; cursor:pointer;}
  .tab-btn.active{background:var(--primary); color:#fff; border-color:var(--primary);}
  .qmeta{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .timer-ring{position:relative; width:72px; height:72px;}
  .timer-ring svg{width:72px; height:72px; transform:rotate(-90deg);}
  .timer-ring circle{fill:none; stroke-width:6;}
  .timer-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-weight:700; font-size:22px;}
  .question-text{font-family:Arial,sans-serif; font-size:clamp(18px,5vw,24px); font-weight:600; line-height:1.35; margin:6px 0 18px; word-break:break-word;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .opt{display:flex; align-items:center; gap:10px; border-radius:14px; padding:18px 16px; font-family:Arial,sans-serif; font-weight:700; font-size:16px; line-height:1.25; color:#fff; cursor:pointer; border:none; text-align:left; min-height:64px; transition:transform .12s,box-shadow .12s,opacity .12s;}
  .opt.opt-md{font-size:14px; padding:14px 14px; gap:8px;}
  .opt.opt-sm{font-size:12.5px; padding:12px 12px; gap:7px;}
  .opt.opt-xs{font-size:11.5px; padding:10px 10px; gap:6px; line-height:1.2;}
  body.host-stage .opt.opt-md{font-size:clamp(13px,1.7vh,17px);}
  body.host-stage .opt.opt-sm{font-size:clamp(12px,1.5vh,15px);}
  body.host-stage .opt.opt-xs{font-size:clamp(11px,1.3vh,13px);}
  .opt.red{background:var(--a-red); box-shadow:0 6px 0 0 #C23140;} .opt.blue{background:var(--a-blue); box-shadow:0 6px 0 0 #1560B0;} .opt.yellow{background:var(--a-yellow); box-shadow:0 6px 0 0 #C98600;} .opt.green{background:var(--a-green); box-shadow:0 6px 0 0 #1F9E5A;}
  .opt:not(:disabled):hover{transform:translateY(-2px);}
  .opt:not(:disabled):active{transform:translateY(4px); box-shadow:none !important;}
  .opt:disabled:not(.selected){opacity:.45; cursor:default; box-shadow:none;}
  .opt.selected:disabled{opacity:1; cursor:default; transform:translateY(-4px);}
  .opt.reveal-correct{opacity:1 !important; cursor:default; background:#22C55E !important; box-shadow:0 6px 0 0 #16803C !important; transform:translateY(-4px);}
  .opt.reveal-wrong{opacity:1 !important; cursor:default; background:#EF4444 !important; box-shadow:0 6px 0 0 #B91C1C !important;}
  .opt-logo{width:28px; height:28px; border-radius:9px; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 2px 6px rgba(0,0,0,.18);}
  .opt-logo span{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:16px; line-height:1; display:block;}
  .leader-row{display:flex; align-items:center; justify-content:space-between; background:var(--panel-2); border:1.5px solid var(--line); border-radius:12px; padding:12px 16px; margin-bottom:8px; animation:rowIn .5s ease both; box-shadow:0 2px 8px rgba(36,27,77,.07);}
  .leader-row.top1{background:linear-gradient(90deg,rgba(255,201,60,.34),rgba(255,201,60,.10)); border-color:rgba(217,160,20,.65); box-shadow:0 6px 16px rgba(255,201,60,.28);}
  .leader-row.top2{background:linear-gradient(90deg,rgba(148,163,184,.34),rgba(148,163,184,.10)); border-color:rgba(100,116,139,.55);}
  .leader-row.top3{background:linear-gradient(90deg,rgba(217,119,6,.30),rgba(217,119,6,.08)); border-color:rgba(180,95,10,.5);}
  @keyframes rowIn{from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:translateY(0);}}
  .rank-change{font-family:Arial,sans-serif; font-size:13px; font-weight:800; margin:0 6px; min-width:14px; text-align:center;}
  .rank-change.up{color:#22C55E;}
  .rank-change.down{color:#EF4444;}
  .rank-change.same{color:var(--text-dim); opacity:.5;}
  .leader-rank{font-family:Arial,sans-serif; font-weight:700; color:var(--text-dim); width:28px;}
  .leader-name{font-weight:600; flex:1; margin-left:6px;}
  .leader-score{font-family:Arial,sans-serif; font-weight:700; color:var(--gold);}
  .muted{color:var(--text-dim); font-size:14px;}
  .divider{height:1px; background:var(--line); margin:18px 0;}
  .result-banner{text-align:center; padding:18px; border-radius:14px; margin-bottom:16px; font-family:Arial,sans-serif; font-weight:700; font-size:20px;}
  .result-banner.ok{background:rgba(34,197,94,.14); color:#16A34A; border:1px solid rgba(34,197,94,.35);}
  .result-banner.no{background:rgba(255,71,87,.12); color:#DC2626; border:1px solid rgba(255,71,87,.35);}

  /* ===== Q&A card: question box = 1/3 height (dark blur box), answers = 3/5 height (fills area, each opt = 1/4), footer sized to content pinned at bottom ===== */
  .card.qa-card{display:flex; flex-direction:column; min-height:clamp(420px,70vh,640px);}
  .qa-question{flex:3 1 0%; display:flex; align-items:stretch; justify-content:center;}
  .question-box{width:100%; height:calc(100% - 20px); margin-bottom:20px; display:flex; align-items:center; justify-content:center; background:rgba(58,45,120,.16); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.4); border-radius:18px; padding:22px 24px; box-shadow:0 8px 22px rgba(20,10,50,.10), inset 0 1px 0 rgba(255,255,255,.3);}
  .question-box .question-text{width:100%; margin:0; color:#1A1333; text-align:center;}
  .question-box.explain-box{flex-direction:column; background:var(--primary); border-color:rgba(255,255,255,.35); box-shadow:0 0 0 6px rgba(139,92,246,.25), 0 8px 22px rgba(80,40,160,.4), inset 0 1px 0 rgba(255,255,255,.25); animation:explainPop .55s cubic-bezier(.34,1.4,.64,1) both;}
  .question-box.explain-box .question-text{color:#fff;}
  @keyframes explainPop{
    0%{transform:scale(.9); box-shadow:0 0 0 0 rgba(139,92,246,.7), 0 8px 22px rgba(80,40,160,.4), inset 0 1px 0 rgba(255,255,255,.25);}
    55%{transform:scale(1.035);}
    100%{transform:scale(1); box-shadow:0 0 0 6px rgba(139,92,246,.25), 0 8px 22px rgba(80,40,160,.4), inset 0 1px 0 rgba(255,255,255,.25);}
  }
  .explain-tag{font-family:Arial,sans-serif !important; display:inline-flex; align-items:center; gap:6px; background:#fff; color:#052699; font-weight:700; font-size:14px; letter-spacing:.3px; padding:7px 18px; border-radius:999px; margin-bottom:14px; flex-shrink:0; box-shadow:0 4px 10px rgba(0,0,0,.25); animation:explainTagPulse 1.6s ease-in-out .55s 2;}
  @keyframes explainTagPulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.08);}}
  .qa-answers{flex:2 1 0%; display:flex; align-items:stretch;}
  .qa-answers .opts{width:100%; height:100%; grid-template-rows:1fr 1fr;}
  .qa-answers .opts .opt{height:100%; min-height:0;}
  .qa-footer{flex:0 0 auto; display:flex; flex-direction:column; justify-content:flex-end;}

  /* ===== Leaderboard card: footer (divider + action) pinned to bottom ===== */
  .card.lb-card{display:flex; flex-direction:column; min-height:clamp(420px,70vh,640px);}
  .lb-title{margin-top:0; text-transform:uppercase; font-size:clamp(20px,4.6vw,30px); letter-spacing:1px;}
  .lb-list{flex:1; overflow:auto; background:none; border:2px solid #052699; border-radius:16px; padding:12px;}
  .lb-list .muted{color:var(--text-dim);}
  .lb-footer{margin-top:auto;}

  /* ===== Final results card: footer (divider + back button) pinned to bottom ===== */
  .card.ended-card{display:flex; flex-direction:column; min-height:clamp(420px,70vh,640px);}
  .ended-list{flex:1; overflow:auto;}
  .ended-footer{margin-top:auto;}

  /* ===== Podium reveal (top 3 khi kết thúc trận) ===== */
  .card.podium-card{display:flex; flex-direction:column; align-items:center; min-height:clamp(420px,70vh,640px); position:relative; overflow:hidden;}
  body.host-stage .card.podium-card{overflow-y:hidden;}
  .podium-heading{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:clamp(24px,5.6vw,34px); letter-spacing:1px; color:var(--text); margin:20px 0 0 0; text-align:center; flex:0 0 auto;}
  .podium-stage{flex:1 1 0%; min-height:0; width:100%; display:flex; align-items:center; justify-content:center;}
  .podium-row{width:100%; display:flex; align-items:flex-end; justify-content:center; gap:clamp(6px,1.8vw,14px); padding:0 4px; position:relative; z-index:1;}
  .podium-slot{flex:0 0 auto; width:clamp(96px,26vw,160px); min-width:0; display:flex; flex-direction:column; align-items:center; transform-origin:center bottom; animation:podiumSlideUp .8s cubic-bezier(.34,1.4,.64,1) both;}
  @keyframes podiumSlideUp{from{opacity:0; transform:translateY(36px);} to{opacity:1; transform:translateY(0);}}
  .podium-slot.rank2{order:1;}
  .podium-slot.rank1{order:2;}
  .podium-slot.rank3{order:3;}
  .podium-slot .avatar{width:clamp(52px,11.5vw,80px); height:clamp(52px,11.5vw,80px); font-size:clamp(20px,4.4vw,30px); margin-bottom:8px; box-shadow:0 4px 12px rgba(0,0,0,.25); border:3px solid #052699;}
  .podium-slot .p-name{font-family:Arial,sans-serif !important; font-weight:700; font-size:clamp(15px,3.6vw,20px); color:var(--text); text-align:center; width:100%; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .podium-slot .p-score{font-family:Arial,sans-serif; font-weight:800; color:var(--gold); font-size:clamp(16px,3.8vw,22px); margin-bottom:8px;}
  .podium-block{width:100%; border-radius:10px 10px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:8px; font-family:'Luckiest Guy',cursive; font-weight:400; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3);}
  .podium-slot.rank1 .podium-block{height:clamp(80px,16vh,140px); background:linear-gradient(180deg,#FFE38A,var(--gold)); font-size:clamp(24px,5.4vw,34px); box-shadow:0 -4px 18px rgba(255,201,60,.4);}
  .podium-slot.rank2 .podium-block{height:clamp(60px,12vh,105px); background:linear-gradient(180deg,#E4E9F2,#AEB8C9); font-size:clamp(21px,4.6vw,28px);}
  .podium-slot.rank3 .podium-block{height:clamp(46px,9.5vh,80px); background:linear-gradient(180deg,#F0B87E,#C97A3D); font-size:clamp(21px,4.6vw,28px);}
  .podium-crown{width:100%; text-align:center; font-size:clamp(24px,5.6vw,36px); line-height:1; margin-bottom:6px; filter:drop-shadow(0 3px 5px rgba(0,0,0,.28));}
  .podium-waiting{color:rgba(255,255,255,.9); font-weight:700; font-size:clamp(16px,4vw,20px); text-align:center; margin:auto;}

  /* ===== Player: tổng kết cá nhân cuối trận ===== */
  .me-summary{display:flex; align-items:center; gap:14px; background:linear-gradient(135deg,rgba(255,201,60,.22),rgba(139,92,246,.10)); border:1.5px solid rgba(255,201,60,.4); border-radius:16px; padding:16px; margin-bottom:16px;}
  .me-summary .avatar{width:52px; height:52px; font-size:20px; flex-shrink:0; border:3px solid #052699;}
  .me-summary .me-info{flex:1; min-width:0;}
  .me-summary .me-name{font-weight:800; font-size:17px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

<body>
<div class="brand" id="brand-home" role="button" tabindex="0" aria-label="Về trang chủ"><div class="logo"><img src="logo.jpg" alt="Live!QUIZZ logo" onerror="this.style.display='none'"></div><span class="title" aria-label="Live!QUIZZ"><span class="letter">L</span><span class="letter">i</span><span class="letter">v</span><span class="letter">e</span><span class="letter bang">!</span><span class="letter">Q</span><span class="letter">U</span><span class="letter">I</span><span class="letter">Z</span><span class="letter">Z</span></span></div>
<button id="audio-toggle" class="audio-toggle" aria-label="Bật/tắt âm thanh" title="Bật/tắt âm thanh">🔊</button>
<div class="fx-layer" id="fx-layer"></div>
<div id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const OPT_CLASSES = ["red","blue","yellow","green"];
const SHAPES = {
  red:`<span class="opt-logo"><span style="color:var(--a-red)">V</span></span>`,
  blue:`<span class="opt-logo"><span style="color:var(--a-blue)">V</span></span>`,
  yellow:`<span class="opt-logo"><span style="color:var(--a-yellow)">V</span></span>`,
  green:`<span class="opt-logo"><span style="color:var(--a-green)">V</span></span>`,
};
// Anh avatar co san trong public/avt — key la "ma icon" luu trong du lieu nguoi choi,
// value la ten file thuc te (co doi .webp/.jpg tuy anh).
const AVT_FILES = {
  "avt-1":"avt-1.webp", "avt-2":"avt-2.jpg", "avt-3":"avt-3.jpg", "avt-4":"avt-4.webp", "avt-5":"avt-5.jpg",
  "avt-6":"avt-6.jpg", "avt-7":"avt-7.jpg", "avt-8":"avt-8.jpg", "avt-9":"avt-9.webp", "avt-10":"avt-10.jpg",
};
const ICON_OPTS = Object.keys(AVT_FILES);
// Tra ve HTML cho 1 avatar: anh neu icon la ma anh hop le, khong thi rot ve chu cai dau ten (fallback cu).
function avatarHtml(icon, name){
  const file = AVT_FILES[icon];
  if(file) return `<img src="/avt/${file}" alt="">`;
  return esc((icon || name || "?").slice(0,1).toUpperCase());
}

// Am thanh: hieu ung ngan (sfx) tu tong hop bang Web Audio API, nhac nen (bgm) la file
// nhac that phat qua the <audio>. Bat/tat qua nut loa, nho trang thai qua localStorage.
const Sound = (function(){
  let ctx = null, masterGain = null;
  let muted = localStorage.getItem("quizMuted") === "1";
  const bgmFiles = { lobby:"/bgm/lobby-extreme-sports-mayhem.mp3", question:"/bgm/question-techno-gameplay.mp3", podium:"/bgm/podium-techno-celebration.mp3" };
  const bgmEls = {};
  let currentBgm = null;

  function ensureCtx(){
    if(!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = muted ? 0 : 0.5;
      masterGain.connect(ctx.destination);
    }
    if(ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function ensureBgm(name){
    if(!bgmEls[name]){
      const a = new Audio(bgmFiles[name]);
      a.loop = true;
      a.volume = muted ? 0 : 0.35;
      bgmEls[name] = a;
    }
    return bgmEls[name];
  }
  function tone(freq, start, dur, type, peak){
    const c = ensureCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(peak, start + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g); g.connect(masterGain);
    o.start(start); o.stop(start + dur + 0.02);
  }
  function slide(freqFrom, freqTo, start, dur, type, peak){
    const c = ensureCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freqFrom, start);
    o.frequency.exponentialRampToValueAtTime(freqTo, start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(peak, start + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    o.connect(g); g.connect(masterGain);
    o.start(start); o.stop(start + dur + 0.02);
  }
  function noiseBurst(start, dur, peak, freqCenter){
    const c = ensureCtx();
    const buffer = c.createBuffer(1, Math.max(1, Math.floor(c.sampleRate * dur)), c.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
    const src = c.createBufferSource(); src.buffer = buffer;
    const bp = c.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = freqCenter || 1200; bp.Q.value = 1.1;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(peak, start + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(bp); bp.connect(g); g.connect(masterGain);
    src.start(start); src.stop(start + dur + 0.02);
  }
  const sfx = {
    click(){ if(muted) return; const t = ensureCtx().currentTime; tone(1046.5, t, 0.06, "sine", 0.5); },
    tickUrgent(){ if(muted) return; const t = ensureCtx().currentTime; tone(1318.5, t, 0.11, "square", 0.28); },
    // Coi bao 3 tieng "tut-tut-tuuut": 2 tieng ngan cung tong, tieng thu 3 dai hon va thap hon.
    timeUp(){
      if(muted) return;
      const t = ensureCtx().currentTime;
      tone(392, t, 0.13, "square", 0.32);
      tone(392, t + 0.18, 0.13, "square", 0.32);
      tone(293.66, t + 0.36, 0.4, "square", 0.34);
    },
    correct(){ if(muted) return; const t = ensureCtx().currentTime; [523.25,659.25,783.99,1046.5].forEach((f,i)=> tone(f, t+i*0.09, 0.28, "triangle", 0.32)); },
    wrong(){ if(muted) return; const t = ensureCtx().currentTime; tone(196, t, 0.22, "sawtooth", 0.3); tone(146.83, t+0.16, 0.32, "sawtooth", 0.3); },
    drumroll(){
      if(muted) return; const t = ensureCtx().currentTime;
      let time = t; const totalDur = 1.1; let interval = 0.09;
      while(time < t + totalDur){ noiseBurst(time, 0.05, 0.22, 1500); time += interval; interval *= 0.92; }
      tone(220, t + totalDur, 0.3, "sawtooth", 0.4);
    },
    leaderboardStinger(){ if(muted) return; const t = ensureCtx().currentTime; slide(300, 1200, t, 0.4, "sine", 0.3); tone(1568, t+0.32, 0.25, "triangle", 0.25); },
    fanfare(){
      if(muted) return; const t = ensureCtx().currentTime;
      const chords = [[523.25,659.25,783.99],[587.33,739.99,880.0],[659.25,830.61,987.77],[783.99,987.77,1174.66]];
      chords.forEach((chord,i)=>{ const start = t + i*0.22; chord.forEach(f=> tone(f, start, 0.5, "sawtooth", 0.14)); });
    },
    confettiPop(){ if(muted) return; const t = ensureCtx().currentTime; noiseBurst(t, 0.05, 0.25, 2200); tone(1800, t, 0.08, "sine", 0.2); },
  };
  function playBgm(name){
    if(currentBgm === name) return;
    Object.keys(bgmEls).forEach(k=>{ if(k!==name) bgmEls[k].pause(); });
    currentBgm = name;
    if(!name || muted) return;
    ensureBgm(name).play().catch(()=>{});
  }
  function stopBgm(){
    if(currentBgm && bgmEls[currentBgm]) bgmEls[currentBgm].pause();
    currentBgm = null;
  }
  function setMuted(v){
    muted = v;
    localStorage.setItem("quizMuted", v ? "1" : "0");
    if(masterGain) masterGain.gain.value = v ? 0 : 0.5;
    Object.values(bgmEls).forEach(a=> a.volume = v ? 0 : 0.35);
    if(v) Object.values(bgmEls).forEach(a=> a.pause());
    else if(currentBgm) ensureBgm(currentBgm).play().catch(()=>{});
  }
  function toggleMuted(){ setMuted(!muted); return muted; }
  function unlock(){
    ensureCtx();
    if(!muted && currentBgm) ensureBgm(currentBgm).play().catch(()=>{});
  }
  return { sfx, playBgm, stopBgm, toggleMuted, isMuted:()=>muted, unlock };
})();
document.addEventListener("pointerdown", function unlockAudioOnce(){
  Sound.unlock();
  document.removeEventListener("pointerdown", unlockAudioOnce);
}, { once:true });

const urlParams = new URLSearchParams(location.search);
const joinCodeFromUrl = urlParams.get("join");

let state = { screen:"landing", role:null, code:"", totalQuestions:0, currentIndex:0,
  answered:false, lastCorrect:null, lastPoints:0, correctIndex:null, correctText:"", explanation:"", chosenIndex:null,
  selectedIcon: ICON_OPTS[0], questionSets:[], playerName:"",
  resultsStage:"reveal", previousLeaderboard:null, isFirstQuestion:true,
  myResults:null };
let revealTimer = null, podiumTimer = null;

function getClientId(){
  let id = localStorage.getItem("quizClientId");
  if(!id){ id = Date.now().toString(36) + Math.random().toString(36).slice(2,10); localStorage.setItem("quizClientId", id); }
  return id;
}
let tickHandle = null;
let currentDuration = 20000, currentStart = 0;

function el(id){ return document.getElementById(id); }

function loadQuestionSets(){
  fetch("/api/question-sets")
    .then(r=>r.json())
    .then(list=>{
      state.questionSets = Array.isArray(list) ? list : [];
      if(state.screen==="host_setup") render();
    })
    .catch(()=>{ /* giữ danh sách rỗng, vẫn dùng được bộ mặc định */ });
}
function esc(s){ const d=document.createElement("div"); d.innerText=s; return d.innerHTML; }

function render(){
  const app = el("app");
  if(state.screen==="landing") app.innerHTML = viewLanding();
  else if(state.screen==="host_setup") app.innerHTML = viewHostSetup();
  else if(state.screen==="host_lobby") app.innerHTML = viewHostLobby();
  else if(state.screen==="host_question") app.innerHTML = viewQuestion(true);
  else if(state.screen==="host_results") app.innerHTML = viewResults(true);
  else if(state.screen==="host_podium") app.innerHTML = viewPodium();
  else if(state.screen==="host_ended") app.innerHTML = viewEnded();
  else if(state.screen==="player_join") app.innerHTML = viewPlayerJoin();
  else if(state.screen==="player_wait") app.innerHTML = viewPlayerWait();
  else if(state.screen==="player_question") app.innerHTML = viewQuestion(false);
  else if(state.screen==="player_results") app.innerHTML = viewResults(false);
  else if(state.screen==="player_ended") app.innerHTML = viewPlayerEnded();
  bind();
  if(state.screen==="host_lobby") renderQr();
  if((state.screen==="host_results" || state.screen==="player_results") && state.resultsStage==="leaderboard"){
    runLeaderboardReveal("leaderboard", state.previousLeaderboard, state.leaderboard, state.isFirstQuestion);
  }
  const isHostStage = state.screen==="host_question" || state.screen==="host_results" || state.screen==="host_podium" || state.screen==="host_ended";
  document.body.classList.toggle("host-stage", isHostStage);
  document.body.classList.toggle("host-reveal", state.screen==="host_results" && state.resultsStage==="reveal");
  document.body.classList.toggle("lobby-stage", state.screen==="host_lobby");
  if((state.screen==="host_results" && state.resultsStage==="leaderboard") || state.screen==="host_ended") startCelebration();
  else clearFx();
  updateBgmForScreen();
}
// Nhac nen: sanh cho / cau hoi / trao giai co nhac loop rieng, cac man con lai (reveal, bang
// xep hang, ket qua cuoi) dung sfx ngan (drumroll, stinger, fanfare) thay vi nhac nen lien tuc.
function updateBgmForScreen(){
  const s = state.screen;
  if(s==="host_lobby" || s==="player_wait") Sound.playBgm("lobby");
  else if(s==="host_question" || s==="player_question") Sound.playBgm("question");
  else if(s==="host_podium") Sound.playBgm("podium");
  else Sound.stopBgm();
}

function renderQr(){
  const box = el("qr-box");
  if(!box) return;
  box.innerHTML = "";
  const joinUrl = `${location.origin}${location.pathname}?join=${state.code}`;
  new QRCode(box, { text: joinUrl, width: 42, height: 42, colorDark:"#241B4D", colorLight:"#ffffff" });
  box.onclick = openQrModal;
}

function openQrModal(){
  const joinUrl = `${location.origin}${location.pathname}?join=${state.code}`;
  const overlay = document.createElement("div");
  overlay.className = "qr-modal-overlay";
  overlay.onclick = ()=> overlay.remove();
  const modalBox = document.createElement("div");
  modalBox.className = "qr-modal-box";
  modalBox.onclick = (e)=> e.stopPropagation();
  const codeLabel = document.createElement("div");
  codeLabel.className = "qr-modal-code";
  codeLabel.innerText = state.code;
  const qrHolder = document.createElement("div");
  modalBox.appendChild(codeLabel);
  modalBox.appendChild(qrHolder);
  overlay.appendChild(modalBox);
  document.body.appendChild(overlay);
  new QRCode(qrHolder, { text: joinUrl, width: 320, height: 320, colorDark:"#241B4D", colorLight:"#ffffff" });
}

// ---- Celebration effects (confetti + fireworks) ----
let fxInterval = null;
const FX_COLORS = ["#FFC93C","#8B5CF6","#12B886","#FF4757","#1E90FF","#2ED573"];
function clearFx(){
  if(fxInterval){ clearInterval(fxInterval); fxInterval = null; }
  const layer = el("fx-layer");
  if(layer) layer.innerHTML = "";
}
function startCelebration(){
  clearFx();
  const layer = el("fx-layer");
  if(!layer) return;
  spawnConfettiBurst(layer, 36);
  spawnFirework(layer);
  fxInterval = setInterval(()=>{
    spawnFirework(layer);
    if(Math.random()<0.4) spawnConfettiBurst(layer, 10);
  }, 1000);
}
function spawnConfettiBurst(layer, count){
  for(let i=0;i<count;i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random()*100+"%";
    piece.style.background = FX_COLORS[Math.floor(Math.random()*FX_COLORS.length)];
    piece.style.animationDuration = (2.4+Math.random()*2.2)+"s";
    piece.style.animationDelay = (Math.random()*0.8)+"s";
    piece.style.borderRadius = Math.random()<0.5 ? "50%" : "2px";
    layer.appendChild(piece);
    setTimeout(()=>piece.remove(), 5500);
  }
}
function spawnFirework(layer){
  const x = 8+Math.random()*84;
  const y = 12+Math.random()*38;
  const color = FX_COLORS[Math.floor(Math.random()*FX_COLORS.length)];
  const burst = document.createElement("div");
  burst.className = "firework";
  burst.style.left = x+"%";
  burst.style.top = y+"%";
  const sparkCount = 14;
  for(let i=0;i<sparkCount;i++){
    const spark = document.createElement("span");
    spark.className = "spark";
    spark.style.setProperty("--angle", (i/sparkCount*360)+"deg");
    spark.style.background = color;
    burst.appendChild(spark);
  }
  layer.appendChild(burst);
  setTimeout(()=>burst.remove(), 900);
}

// Dap an cang dai (nhieu chu, de xuong nhieu dong) thi chu cang nho lai, tranh khung

// ca 4 o dung chung 1 co chu, tranh lech kich thuoc giua cac o.
function optSizeClass(options){
  const maxLen = Math.max(0, ...(options||[]).map(o=>(o||"").length));
  if(maxLen > 100) return " opt-xs";
  if(maxLen > 70) return " opt-sm";
  if(maxLen > 45) return " opt-md";
  return "";
}
function renderRevealOptions(){
  const sizeClass = optSizeClass(state.options);
  return state.options.map((o,i)=>{
    let extra = "";
    if(i===state.correctIndex) extra = " reveal-correct";
    else if(state.chosenIndex!=null && i===state.chosenIndex) extra = " reveal-wrong";
    return `<button class="opt ${OPT_CLASSES[i]}${sizeClass}${extra}" disabled>${SHAPES[OPT_CLASSES[i]]}<span>${esc(o)}</span></button>`;
  }).join("");
}

// Buc truot len tu duoi vao dung vi tri cua no trong hang (CSS animation podiumSlideUp lo
// phan truot+hien), khong bay ra khoi hang. isTop1 = true se ban confetti/phao hoa.
function revealPodiumRank(rank, player, isTop1){
  const row = el("podium-row");
  if(!row || !player) return Promise.resolve();
  row.insertAdjacentHTML("beforeend", podiumSlotHtml(rank, player));
  Sound.sfx.confettiPop();
  if(isTop1){
    const layer = el("fx-layer");
    if(layer){ spawnConfettiBurst(layer, 50); spawnFirework(layer); }
    Sound.sfx.fanfare();
  }
  return new Promise(resolve=> setTimeout(resolve, 950));
}
async function runPodiumSequence(){
  clearTimeout(podiumTimer);
  state.screen = "host_podium";
  render();
  const top3 = (state.leaderboard || []).slice(0,3);
  if(top3.length===0) return;
  await new Promise(r=>setTimeout(r, 800));
  await revealPodiumRank(3, top3[2], false);
  await new Promise(r=>setTimeout(r, 450));
  await revealPodiumRank(2, top3[1], false);
  await new Promise(r=>setTimeout(r, 450));
  await revealPodiumRank(1, top3[0], true);
  podiumTimer = setTimeout(()=>{
    state.screen = "host_ended";
    render();
  }, 6000);
}

function buildRankMap(list){
  const map = {};
  (list||[]).forEach((p,i)=>{ map[p.name] = i+1; });
  return map;
}
function rankIcon(rank){
  return rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":rank;
}
function leaderRowHtml(p, rank, prevRank, delay){
  const topClass = rank<=3 ? ` top${rank}` : "";
  let changeHtml = "";
  if(prevRank!=null){
    if(prevRank>rank) changeHtml = `<div class="rank-change up">▲</div>`;
    else if(prevRank<rank) changeHtml = `<div class="rank-change down">▼</div>`;
    else changeHtml = `<div class="rank-change same">–</div>`;
  }
  const cid = p.clientId || p.name;
  const delayStyle = delay!=null ? ` style="animation-delay:${delay.toFixed(2)}s"` : "";
  return `<div class="leader-row${topClass}" data-cid="${esc(cid)}"${delayStyle}>
    <div class="leader-rank">${rankIcon(rank)}</div>
    <div class="avatar" style="margin-right:8px">${avatarHtml(p.icon, p.name)}</div>
    <div class="leader-name">${esc(p.name)}</div>
    ${changeHtml}
    <div class="leader-score">${p.score}</div>
  </div>`;
}
function renderLeaderboard(list, prevRankMap){
  if(!list || list.length===0) return `<p class="muted center">Chưa có người chơi nào.</p>`;
  return list.map((p,i)=> leaderRowHtml(p, i+1, prevRankMap ? prevRankMap[p.name] : null, i*0.06)).join("");
}
function animateNumber(elm, from, to, duration){
  if(!elm) return;
  if(from===to){ elm.textContent = to; return; }
  const start = performance.now();
  function step(now){
    const t = Math.min(1, (now-start)/duration);
    const eased = 1 - Math.pow(1-t, 3);
    elm.textContent = Math.round(from + (to-from)*eased);
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
// Animation bang xep hang tu cau thu 2 tro di: hien thu tu CU + diem CU -> cong diem
// chay dan len -> cac hang truot len/xuong ve dung thu tu MOI (ky thuat FLIP don gian).
function runLeaderboardReveal(containerId, prevList, newList, isFirst){
  const container = el(containerId);
  if(!container || !newList) return;
  if(isFirst || !prevList || prevList.length===0){
    container.innerHTML = renderLeaderboard(newList, null);
    return;
  }
  const prevSorted = prevList.slice().sort((a,b)=>b.score-a.score);
  container.innerHTML = prevSorted.map((p,i)=> leaderRowHtml(p, i+1, null, null)).join("");

  setTimeout(()=>{
    prevSorted.forEach(p=>{
      const cid = p.clientId || p.name;
      const newP = newList.find(x=>(x.clientId||x.name)===cid);
      const row = container.querySelector(`[data-cid="${CSS.escape(String(cid))}"]`);
      const scoreEl = row ? row.querySelector(".leader-score") : null;
      if(scoreEl && newP) animateNumber(scoreEl, p.score, newP.score, 1100);
    });

    setTimeout(()=>{
      const prevRankMap = {};
      prevSorted.forEach((p,i)=>{ prevRankMap[p.clientId||p.name] = i+1; });
      const firstRects = {};
      Array.from(container.children).forEach(r=>{ firstRects[r.dataset.cid] = r.getBoundingClientRect(); });

      const newSorted = newList.slice().sort((a,b)=>b.score-a.score);
      // Doi thu tu bang cach DI CHUYEN cac hang DA CO SAN (khong innerHTML lai / tao moi),
      // de khong kich hoat lai animation "roi vao" (rowIn) cua .leader-row — chi con dung
      // 1 hieu ung duy nhat la truot len/xuong (FLIP) ve dung vi tri moi.
      newSorted.forEach(p=>{
        const cid = p.clientId || p.name;
        const row = container.querySelector(`[data-cid="${CSS.escape(String(cid))}"]`);
        if(row) container.appendChild(row);
      });

      Array.from(container.children).forEach((r,i)=>{
        const rank = i+1;
        const cid = r.dataset.cid;
        r.className = "leader-row" + (rank<=3 ? " top"+rank : "");
        const rankEl = r.querySelector(".leader-rank");
        if(rankEl) rankEl.textContent = rankIcon(rank);
        const oldChange = r.querySelector(".rank-change");
        if(oldChange) oldChange.remove();
        const prevRank = prevRankMap[cid];
        if(prevRank!=null){
          let changeHtml = "";
          if(prevRank>rank) changeHtml = `<div class="rank-change up">▲</div>`;
          else if(prevRank<rank) changeHtml = `<div class="rank-change down">▼</div>`;
          else changeHtml = `<div class="rank-change same">–</div>`;
          const scoreEl = r.querySelector(".leader-score");
          if(scoreEl) scoreEl.insertAdjacentHTML("beforebegin", changeHtml);
        }
      });

      // Dung Web Animations API (thay vi tu bat/tat CSS transition) de dam bao animation
      // luon chay muot on dinh, khong bi phu thuoc vao thoi diem reflow/paint cua trinh duyet.
      Array.from(container.children).forEach(r=>{
        const first = firstRects[r.dataset.cid];
        if(!first) return;
        const last = r.getBoundingClientRect();
        const dy = first.top - last.top;
        if(Math.abs(dy) > 1){
          r.animate(
            [{ transform: `translateY(${dy}px)` }, { transform: "translateY(0)" }],
            { duration: 900, easing: "cubic-bezier(.34,1.2,.64,1)", fill: "backwards" }
          );
        }
      });
    }, 1400);
  }, 700);
}

function bind(){
  const b=(id,fn)=>{ const n=el(id); if(n) n.onclick=()=>{ Sound.sfx.click(); fn(); }; };
  b("pick-host", ()=>{ state.screen="host_setup"; render(); loadQuestionSets(); });
  b("pick-player", ()=>{ state.screen="player_join"; render(); });
  b("pick-history", ()=>{ location.href="/history.html"; });
  b("pick-admin", ()=>{ location.href="/admin.html"; });
  b("back-landing", ()=>{
    if(state.role==="player"){ resetToPlayerJoin(); }
    else { location.href = location.pathname; }
  });
  const brandEl = el("brand-home");
  if(brandEl){
    brandEl.onclick = ()=>{ location.href = location.pathname; };
    brandEl.onkeydown = (e)=>{ if(e.key==="Enter" || e.key===" "){ e.preventDefault(); location.href = location.pathname; } };
  }
  const audioToggleEl = el("audio-toggle");
  if(audioToggleEl){
    audioToggleEl.textContent = Sound.isMuted() ? "🔇" : "🔊";
    audioToggleEl.onclick = ()=>{
      const muted = Sound.toggleMuted();
      audioToggleEl.textContent = muted ? "🔇" : "🔊";
    };
  }
  document.querySelectorAll(".icon-opt").forEach(node=>{
    node.onclick=()=>{
      Sound.sfx.click();
      state.selectedIcon = node.dataset.icon;
      document.querySelectorAll(".icon-opt").forEach(n=>n.classList.toggle("active", n===node));
    };
  });
  b("create-room", ()=>{
    const sel = el("question-set-select");
    const questionSetId = sel && sel.value ? sel.value : undefined;
    socket.emit("host:create", { questionSetId }, (res)=>{
      if(!res.ok) return;
      state.role="host"; state.code=res.code; state.totalQuestions=res.totalQuestions;
      state.screen="host_lobby"; render();
    });
  });
  b("start-game", ()=> socket.emit("host:start"));
  b("force-end", ()=> socket.emit("host:endQuestion"));
  b("next-question", ()=> socket.emit("host:next"));
  b("reveal-next", ()=> socket.emit("host:showLeaderboard"));
  b("do-join", ()=>{
    const code=(el("join-code").value||"").trim();
    const name=(el("join-name").value||"").trim();
    const err=el("join-error"); err.innerText="";
    if(!code||!name){ err.innerText="Nhập đầy đủ mã phòng và tên."; return; }
    state.playerName = name;
    socket.emit("player:join", {code, name, icon: state.selectedIcon, clientId: getClientId()}, (res)=>{
      if(!res.ok){ err.innerText=res.error; return; }
      state.role="player"; state.code=code; state.totalQuestions=res.totalQuestions;
      applyResume(res.resume, "player_wait");
      render();
      if(state.screen==="player_question") startTimerLoop();
    });
  });
  document.querySelectorAll(".opt[data-choice]").forEach(btn=>{
    btn.onclick=()=>{
      if(state.role!=="player" || state.answered) return;
      Sound.sfx.click();
      state.answered=true;
      state.chosenIndex = parseInt(btn.dataset.choice);
      document.querySelectorAll(".opt[data-choice]").forEach(x=>x.disabled=true);
      btn.classList.add("selected");
      socket.emit("player:answer", { choice: state.chosenIndex });
    };
  });
}

function startTimerLoop(){
  if(tickHandle) clearInterval(tickHandle);
  let lastSec = null;
  tickHandle = setInterval(()=>{
    const remaining = currentStart + currentDuration - Date.now();
    const numEl = el("timer-num"), ring = el("ring");
    const secs = Math.max(0, Math.ceil(remaining/1000));
    if(numEl) numEl.innerText = secs;
    if(ring){
      const frac = Math.max(0, Math.min(1, remaining/currentDuration));
      ring.setAttribute("stroke-dashoffset", String(176*(1-frac)));
    }
    // Chi tick gap (5s cuoi) de tranh lam phien nhac nen suot ca cau hoi.
    if(secs !== lastSec){
      lastSec = secs;
      if(secs > 0 && secs <= 5) Sound.sfx.tickUrgent();
    }
    if(remaining<=0){
      clearInterval(tickHandle);
      Sound.sfx.timeUp();
    }
  }, 250);
}

// ---- Socket events ----
socket.on("lobby:update", ({players})=>{
  const c = el("lobby-count"); if(c) c.innerText = players.length? `${players.length} người đã tham gia` : "Đang chờ người chơi…";
  const l = el("lobby-players"); if(l) l.innerHTML = players.map(p=>`<div class="player-chip"><div class="avatar">${avatarHtml(p.icon, p.name)}</div>${esc(p.name)}</div>`).join("");
});

function applyQuestionData(data){
  state.currentIndex = data.index; state.totalQuestions = data.total;
  state.question = data.question; state.options = data.options;
  state.answered = false; state.lastCorrect = null; state.lastPoints = 0;
  state.correctIndex = null; state.correctText = ""; state.explanation = ""; state.chosenIndex = null;
  currentStart = data.startTime; currentDuration = data.duration;
  state.screen = state.role==="host" ? "host_question" : "player_question";
}

// Sau khi hiện đáp án đúng (reveal): nếu câu KHÔNG có giải thích, tự động chuyển sang bảng
// xếp hạng sau vài giây như cũ. Nếu câu CÓ giải thích, giữ nguyên màn reveal cho tới khi
// host chủ động bấm "Xem bảng xếp hạng" (xem socket "results:show").
function enterResultsStage(){
  state.resultsStage = "reveal";
  clearTimeout(revealTimer);
  // Bo drumroll: dap an hien ra ngay lap tuc (khong co do tre hoi hop), nen tieng trong
  // don keo dai ~1.1s bi lech nhip, nghe nhu cham so voi hinh anh.
  if(state.role!=="host"){
    if(state.lastCorrect===true) Sound.sfx.correct();
    else if(state.lastCorrect===false) Sound.sfx.wrong();
  }
  if(!state.explanation){
    revealTimer = setTimeout(()=>{
      state.resultsStage = "leaderboard";
      Sound.sfx.leaderboardStinger();
      render();
    }, 2200);
  }
}

// Áp dụng trạng thái "resume" trả về khi (re)join giữa chừng ván đấu, để client bắt kịp
// đúng màn hình đang diễn ra thay vì mắc kẹt ở màn hình chờ.
function applyResume(resume, fallbackScreen){
  if(!resume){ state.screen = fallbackScreen; return; }
  if(resume.phase === "question"){
    applyQuestionData(resume);
  } else if(resume.phase === "results"){
    state.prevRankMap = null;
    state.leaderboard = resume.leaderboard;
    state.previousLeaderboard = resume.previousLeaderboard;
    state.isFirstQuestion = !!resume.isFirstQuestion;
    state.question = resume.question; state.options = resume.options;
    state.correctIndex = resume.correctIndex; state.correctText = resume.correctText;
    state.explanation = resume.explanation || ""; state.chosenIndex = resume.chosenIndex;
    state.lastCorrect = resume.lastCorrect; state.lastPoints = resume.lastPoints || 0;
    state.screen = state.role==="host" ? "host_results" : "player_results";
    if(resume.resultsRevealed){
      clearTimeout(revealTimer);
      state.resultsStage = "leaderboard";
    } else {
      enterResultsStage();
    }
  } else if(resume.phase === "ended"){
    state.leaderboard = resume.leaderboard; state.gameId = resume.gameId;
    state.screen = state.role==="host" ? "host_ended" : "player_ended";
    if(state.role==="player") fetchMyResults();
  } else {
    state.screen = fallbackScreen;
  }
}

function fetchMyResults(){
  socket.emit("player:myResults", {}, (res)=>{
    if(!res.ok) return;
    state.myResults = res;
    if(state.screen==="player_ended") render();
  });
}

// Dua nguoi choi ve man "Tham gia phong" (nhap ma phong/ten/icon) thay vi trang chu chung,
// dung khi: host thoat phong (room:closed) hoac nguoi choi tu bam "Ve trang chu" sau khi ket thuc.
function resetToPlayerJoin(){
  state.role = null; state.code = ""; state.myResults = null;
  state.leaderboard = null; state.prevRankMap = null; state.gameId = null;
  state.screen = "player_join";
  render();
}

socket.on("room:closed", ()=>{
  if(state.role==="player") resetToPlayerJoin();
});

socket.on("game:question", (data)=>{
  applyQuestionData(data);
  render();
  startTimerLoop();
});

socket.on("answer:ack", ({correct, points})=>{
  state.lastCorrect = correct; state.lastPoints = points;
});

socket.on("answer:count", ({answered,total})=>{
  const c = el("answered-count"); if(c) c.innerText = `${answered}/${total} người đã trả lời`;
});

socket.on("game:results", ({leaderboard, previousLeaderboard, isFirstQuestion, correctIndex, correctText, explanation})=>{
  // Cau hoi ket thuc som (host force-end) truoc khi het gio: phai huy tickHandle ngay,
  // neu khong no van chay ngam va phat tick/timeUp tre vao dung luc dang o man reveal/xep hang.
  if(tickHandle) clearInterval(tickHandle);
  state.prevRankMap = buildRankMap(state.leaderboard);
  state.leaderboard = leaderboard;
  state.previousLeaderboard = previousLeaderboard;
  state.isFirstQuestion = !!isFirstQuestion;
  state.correctIndex = correctIndex; state.correctText = correctText; state.explanation = explanation || "";
  state.screen = state.role==="host" ? "host_results" : "player_results";
  enterResultsStage();
  render();
});

// Host bam "Xem bang xep hang" (chi xay ra khi cau hoi co giai thich) -> ca phong cung
// chuyen sang giai doan bang xep hang.
socket.on("results:show", ()=>{
  clearTimeout(revealTimer);
  if(state.screen==="host_results" || state.screen==="player_results"){
    state.resultsStage = "leaderboard";
    Sound.sfx.leaderboardStinger();
    render();
  }
});

socket.on("game:ended", ({leaderboard, gameId})=>{
  if(tickHandle) clearInterval(tickHandle);
  state.prevRankMap = buildRankMap(state.leaderboard);
  state.leaderboard = leaderboard;
  state.gameId = gameId;
  state.myResults = null;
  if(state.role==="host"){
    runPodiumSequence();
  } else {
    state.screen = "player_ended";
    render();
    fetchMyResults();
  }
});

// Khi mạng chập chờn, Socket.io tự reconnect nhưng server cấp socket.id mới —
// nếu đang là người chơi giữa ván, tự động rejoin bằng clientId để không bị "rớt" khỏi phòng.
socket.on("connect", ()=>{
  if(state.role==="player" && state.code){
    socket.emit("player:join", {code: state.code, name: state.playerName, icon: state.selectedIcon, clientId: getClientId()}, (res)=>{
      if(!res.ok){ return; } // phòng không còn tồn tại — giữ nguyên màn hình hiện tại, không làm gì thêm
      state.totalQuestions = res.totalQuestions;
      applyResume(res.resume, state.screen);
      render();
      if(state.screen==="player_question") startTimerLoop();
    });
  }
});

if(joinCodeFromUrl){
  state.code = joinCodeFromUrl;
  state.screen = "player_join";
}
render();
</script>
</body>
