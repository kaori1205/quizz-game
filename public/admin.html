<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý bộ câu hỏi — Live!Quizz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#6D28D9; --primary-2:#8B5CF6; --gold:#FFC93C;
    --text:#241B4D; --text-dim:#6B6389; --line:#E7E3F6; --panel:#FFFFFF; --panel-2:#F4F1FF;
    --red:#FF4757; --blue:#1E90FF; --yellow:#FFC107; --green:#2ED573;
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; min-height:100dvh; font-family:Arial,sans-serif; color:var(--text);
    background:linear-gradient(135deg,#6D28D9 0%,#8B5CF6 45%,#A855F7 100%);
    padding:32px 16px 60px; display:flex; flex-direction:column; align-items:center;}
  .brand{display:flex; align-items:center; gap:2px; margin-bottom:22px; text-decoration:none;}
  .brand .logo{width:40px;height:40px;border-radius:11px; background:#fff; box-shadow:0 4px 18px rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center; overflow:hidden; transform:rotate(-6deg); flex-shrink:0;}
  .brand .logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .brand span.title{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:22px; letter-spacing:1px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.2);}
  .brand .letter{display:inline-block;}
  .brand .letter.bang{color:var(--gold); animation:bangPulse 1.3s ease-in-out infinite; text-shadow:0 0 10px rgba(255,201,60,.7), 0 2px 10px rgba(0,0,0,.2); transform-origin:bottom center; will-change:transform;}
  @keyframes bangPulse{
    0%,60%,100%{transform:translateY(0) scale(1) rotate(0deg);}
    30%{transform:translateY(-9px) scale(1.25) rotate(8deg);}
  }
  @media (prefers-reduced-motion:reduce){
    .brand .letter.bang{animation:none;}
  }
  #wrap{width:100%; max-width:820px;}
  .top-bar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .top-bar h1{font-family:Arial,Helvetica,sans-serif; font-weight:700; letter-spacing:.3px; font-size:clamp(30px,5.4vw,42px);
    margin:0; color:#fff;
    text-shadow:-1.5px 0 0 rgba(76,29,149,.9), 1.5px 0 0 rgba(76,29,149,.9), 0 -1.5px 0 rgba(76,29,149,.9), 0 1.5px 0 rgba(76,29,149,.9),
      0 6px 14px rgba(20,10,50,.35);}
  .link-btn{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.35); padding:9px 18px;
    border-radius:999px; font-weight:700; font-size:14px; font-family:Arial,sans-serif; text-decoration:none; cursor:pointer; transition:transform .15s, background .15s;}
  .link-btn:hover{background:rgba(255,255,255,.28); transform:translateY(-2px);}
  .card{background:var(--panel); border-radius:22px; padding:24px; box-shadow:0 24px 60px rgba(30,10,60,.32);}
  .muted{color:var(--text-dim); font-size:14px;}
  .btn{border:none; border-radius:12px; padding:11px 18px; font-weight:700; font-size:14px; cursor:pointer;
    font-family:Arial,sans-serif; transition:transform .12s, box-shadow .12s;}
  .btn.primary{background:var(--primary); color:#fff; box-shadow:0 5px 0 0 #4C1D95;}
  .btn.primary:hover{transform:translateY(-2px);}
  .btn.primary:active{transform:translateY(3px); box-shadow:0 1px 0 0 #4C1D95;}
  .btn.secondary{background:var(--panel-2); color:var(--text); box-shadow:0 5px 0 0 #D8D0F5;}
  .btn.secondary:hover{background:#E9E4FB; transform:translateY(-2px);}
  .btn.secondary:active{transform:translateY(3px); box-shadow:0 1px 0 0 #D8D0F5;}
  .btn.danger{background:rgba(255,71,87,.12); color:var(--red);}
  .btn.danger:hover{background:rgba(255,71,87,.2);}
  .btn.small{padding:7px 12px; font-size:13px; border-radius:9px;}
  .btn:disabled{opacity:.5; cursor:not-allowed; transform:none !important; box-shadow:none !important;}

  /* ---- List view ---- */
  #list-empty{text-align:center; padding:36px 12px; color:var(--text-dim);}
  .set-row{display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--panel-2);
    border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:10px; flex-wrap:wrap;
    border-left:5px solid var(--primary-2); transition:transform .12s;}
  .set-row:hover{transform:translateX(2px);}
  .set-info{min-width:0;}
  .set-name{font-weight:700; font-size:16px; margin-bottom:2px; word-break:break-word; font-family:Arial,sans-serif;}
  .set-meta{font-size:13px; color:var(--text-dim); font-family:Arial,sans-serif;}
  .set-actions{display:flex; gap:8px; flex-shrink:0;}

  /* ---- Editor view ---- */
  .field{margin-bottom:16px;}
  .field label{display:block; font-weight:700; font-size:13px; margin-bottom:6px; color:var(--text-dim); font-family:Arial,sans-serif;}
  .field input[type=text], .field input[type=number], .field textarea{
    width:100%; border:2px solid var(--line); border-radius:10px; padding:10px 12px; font-size:15px;
    font-family:Arial,sans-serif; color:var(--text); background:#fff; transition:border-color .12s;}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--primary-2);}
  .row-2{display:grid; grid-template-columns:1fr 160px; gap:16px;}
  @media (max-width:520px){ .row-2{grid-template-columns:1fr;} }

  .q-block{border:1px solid var(--line); border-left:6px solid var(--primary-2); border-radius:16px; padding:16px;
    margin-bottom:14px; background:#fbfaff;}
  .q-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .q-badge{display:inline-flex; align-items:center; justify-content:center; padding:4px 14px; border-radius:999px;
    font-weight:700; font-size:13px; font-family:Arial,sans-serif; letter-spacing:.2px;}
  .opt-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:10px 14px; border-radius:14px;
    border:2px solid var(--line); transition:transform .12s, box-shadow .12s;}
  .opt-row:hover{transform:translateY(-1px);}
  .opt-row:has(input:checked){box-shadow:0 5px 14px rgba(20,10,50,.18); transform:translateY(-1px);}
  .opt-row textarea{flex:1; font-family:Arial,sans-serif; background:#fff; border-radius:10px; border-width:2px; border-style:solid;
    resize:none; overflow:hidden; min-height:40px; line-height:1.35; padding:9px 12px; font-size:15px; color:var(--text);}
  .opt-row textarea:focus{outline:none; border-color:var(--primary-2);}
  .opt-row input[type=radio]{width:20px; height:20px; flex-shrink:0; cursor:pointer;}
  .opt-row .opt-tag{font-size:16px; font-weight:800; width:24px; text-align:center; flex-shrink:0; font-family:Arial,sans-serif;}
  .explain-field{background:rgba(5,38,153,.06); border:1px dashed rgba(5,38,153,.35); border-radius:12px; padding:12px 14px; margin-top:12px;}
  .explain-field label{color:#052699; margin-bottom:6px;}
  .explain-field textarea{border-color:rgba(5,38,153,.3); background:#fbfbff;}

  #editor-error{color:var(--red); font-size:14px; margin-bottom:10px; display:none; font-family:Arial,sans-serif;}
  .section-divider{height:1px; background:var(--line); margin:20px 0;}
  .add-q-row{text-align:center;}
  .btn.add-q{width:100%; background:var(--panel-2); border:2px dashed var(--primary-2); color:var(--primary);
    font-size:15px; padding:13px; border-radius:14px; box-shadow:none;}
  .btn.add-q:hover{background:#ECE6FE; transform:translateY(-2px);}
  .btn.add-q:active{transform:translateY(1px);}
  .editor-footer{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
  .hint{font-size:13px; color:var(--text-dim); margin:0 0 16px; font-family:Arial,sans-serif;}
</style>
</head>
<body>
  <a class="brand" href="/">
    <div class="logo"><img src="logo.jpg" alt="Live!QUIZZ logo" onerror="this.style.display='none'"></div>
    <span class="title" aria-label="Live!QUIZZ"><span class="letter">L</span><span class="letter">i</span><span class="letter">v</span><span class="letter">e</span><span class="letter bang">!</span><span class="letter">Q</span><span class="letter">U</span><span class="letter">I</span><span class="letter">Z</span><span class="letter">Z</span></span>
  </a>
  <div id="wrap">
    <div class="top-bar">
      <h1 id="page-title">Quản lý bộ câu hỏi</h1>
      <a class="link-btn" href="/">← Về trang chủ</a>
    </div>

    <!-- ===== LIST VIEW ===== -->
    <div class="card" id="view-list">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;">
        <p class="muted" style="margin:0">Các bộ câu hỏi đã lưu, dùng lại khi tạo phòng mới.</p>
        <button class="btn primary" id="btn-new-set">+ Tạo bộ câu hỏi mới</button>
      </div>
      <div id="set-list"></div>
      <div id="list-empty" style="display:none">Chưa có bộ câu hỏi nào. Bấm "Tạo bộ câu hỏi mới" để bắt đầu.</div>
    </div>

    <!-- ===== EDITOR VIEW ===== -->
    <div class="card" id="view-editor" style="display:none">
      <div id="editor-error"></div>
      <div class="row-2">
        <div class="field">
          <label>Tên bộ câu hỏi</label>
          <input type="text" id="set-name" placeholder="Ví dụ: Kiến thức chung — vòng 1">
        </div>
        <div class="field">
          <label>Thời gian mỗi câu (giây)</label>
          <input type="number" id="set-duration" min="5" max="120" value="20">
        </div>
      </div>

      <div id="questions-wrap"></div>

      <div class="section-divider"></div>
      <div class="add-q-row">
        <button class="btn add-q" id="btn-add-question" type="button">+ Thêm câu hỏi</button>
      </div>
      <div class="section-divider"></div>

      <p class="hint">Mỗi câu cần đủ 4 đáp án và chọn đúng 1 đáp án đúng (chấm tròn bên trái). Phần giải thích là tuỳ chọn.</p>
      <div class="editor-footer">
        <button class="btn primary" id="btn-save-set">Lưu bộ câu hỏi</button>
        <button class="btn secondary" id="btn-cancel-edit">Huỷ</button>
      </div>
    </div>
  </div>

<script>
const API = "/api/question-sets";
let sets = [];
let editingId = null;   // null = tạo mới
let questions = [];     // [{q, options:[4], correct}]

const $ = (id)=>document.getElementById(id);
const esc = (s)=> String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function blankQuestion(){
  return { q:"", options:["","","",""], correct:0, explanation:"" };
}

const NAVY = "#052699"; // màu navy lấy từ chữ "V" trong logo
const OPT_STYLES = [
  { solid:"#FF4757", bg:"rgba(255,71,87,.10)", border:"rgba(255,71,87,.45)" },
  { solid:"#1E90FF", bg:"rgba(30,144,255,.10)", border:"rgba(30,144,255,.45)" },
  { solid:"#E0A800", bg:"rgba(255,193,7,.16)", border:"rgba(255,193,7,.6)" },
  { solid:"#2ED573", bg:"rgba(46,213,115,.10)", border:"rgba(46,213,115,.45)" },
];

// ---------------- List view ----------------
async function loadSets(){
  const res = await fetch(API);
  sets = await res.json();
  renderList();
}

function renderList(){
  const wrap = $("set-list");
  if(sets.length===0){
    wrap.innerHTML = "";
    $("list-empty").style.display = "block";
    return;
  }
  $("list-empty").style.display = "none";
  wrap.innerHTML = sets.map(s=>`
    <div class="set-row">
      <div class="set-info">
        <div class="set-name">${esc(s.name)}</div>
        <div class="set-meta">${s.numQuestions} câu · ${s.duration}s/câu · cập nhật ${new Date(s.updatedAt).toLocaleString("vi-VN")}</div>
      </div>
      <div class="set-actions">
        <button class="btn small secondary" data-act="edit" data-id="${s.id}">Sửa</button>
        <button class="btn small secondary" data-act="dup" data-id="${s.id}">Nhân bản</button>
        <button class="btn small danger" data-act="del" data-id="${s.id}">Xoá</button>
      </div>
    </div>`).join("");

  wrap.querySelectorAll("button[data-act]").forEach(btn=>{
    btn.onclick = ()=> handleListAction(btn.dataset.act, btn.dataset.id);
  });
}

async function handleListAction(act, id){
  if(act==="edit"){
    const res = await fetch(`${API}/${id}`);
    if(!res.ok) return alert("Không tìm thấy bộ câu hỏi.");
    const set = await res.json();
    openEditor(set);
  } else if(act==="dup"){
    const res = await fetch(`${API}/${id}`);
    if(!res.ok) return alert("Không tìm thấy bộ câu hỏi.");
    const set = await res.json();
    openEditor({ name: set.name + " (bản sao)", duration: set.duration, questions: set.questions }, true);
  } else if(act==="del"){
    if(!confirm("Xoá bộ câu hỏi này? Không thể hoàn tác.")) return;
    const res = await fetch(`${API}/${id}`, { method:"DELETE" });
    if(res.ok) loadSets();
    else alert("Xoá thất bại.");
  }
}

// ---------------- Editor view ----------------
function openEditor(set, forceNew){
  editingId = (set && set.id && !forceNew) ? set.id : null;
  $("set-name").value = set ? set.name : "";
  $("set-duration").value = set ? set.duration : 20;
  questions = (set && set.questions && set.questions.length)
    ? set.questions.map(q=>({ q:q.q, options:q.options.slice(0,4), correct:q.correct, explanation:q.explanation||"" }))
    : [blankQuestion()];
  $("editor-error").style.display = "none";
  $("page-title").innerText = editingId ? "Sửa bộ câu hỏi" : "Tạo bộ câu hỏi mới";
  renderQuestions();
  $("view-list").style.display = "none";
  $("view-editor").style.display = "block";
  window.scrollTo(0,0);
}

function closeEditor(){
  editingId = null;
  $("page-title").innerText = "Quản lý bộ câu hỏi";
  $("view-editor").style.display = "none";
  $("view-list").style.display = "block";
}

function renderQuestions(){
  const wrap = $("questions-wrap");
  wrap.innerHTML = questions.map((q, qi)=>{
    return `
    <div class="q-block" style="border-left-color:${NAVY}">
      <div class="q-head">
        <span class="q-badge" style="background:${NAVY}; color:#fff">Câu ${qi+1}</span>
        <button class="btn small danger" type="button" data-remove-q="${qi}" ${questions.length<=1?"disabled":""}>Xoá câu</button>
      </div>
      <div class="field">
        <textarea rows="2" placeholder="Nhập nội dung câu hỏi..." data-q-text="${qi}">${esc(q.q)}</textarea>
      </div>
      ${q.options.map((opt, oi)=>{
        const oc = OPT_STYLES[oi];
        const letter = String.fromCharCode(65 + oi); // A, B, C, D
        return `
        <div class="opt-row" style="background:${oc.bg}; border-color:${oc.border}">
          <input type="radio" name="correct-${qi}" ${q.correct===oi?"checked":""} data-q-correct="${qi}" data-opt-index="${oi}" style="accent-color:${oc.solid}">
          <span class="opt-tag" style="color:${oc.solid}">${letter}</span>
          <textarea rows="1" placeholder="Nội dung đáp án ${letter}" data-q-opt="${qi}" data-opt-index="${oi}" style="border-color:${oc.border}; background:#fff;">${esc(opt)}</textarea>
        </div>`;
      }).join("")}
      <div class="field explain-field">
        <label>Giải thích đáp án đúng (không bắt buộc)</label>
        <textarea rows="2" placeholder="Ví dụ: Hà Nội là thủ đô của Việt Nam từ năm 1010, khi vua Lý Thái Tổ dời đô về Thăng Long..." data-q-explain="${qi}">${esc(q.explanation||"")}</textarea>
      </div>
    </div>`;
  }).join("");

  function autoResize(t){ t.style.height="auto"; t.style.height=(t.scrollHeight+2)+"px"; }

  wrap.querySelectorAll("[data-remove-q]").forEach(btn=>{
    btn.onclick = ()=>{
      const qi = Number(btn.dataset.removeQ);
      questions.splice(qi,1);
      renderQuestions();
    };
  });
  wrap.querySelectorAll("[data-q-text]").forEach(t=>{
    t.oninput = ()=>{ questions[Number(t.dataset.qText)].q = t.value; };
  });
  wrap.querySelectorAll("[data-q-explain]").forEach(t=>{
    t.oninput = ()=>{ questions[Number(t.dataset.qExplain)].explanation = t.value; };
  });
  wrap.querySelectorAll("[data-q-opt]").forEach(t=>{
    autoResize(t);
    t.oninput = ()=>{
      const qi = Number(t.dataset.qOpt), oi = Number(t.dataset.optIndex);
      questions[qi].options[oi] = t.value;
      autoResize(t);
    };
  });
  wrap.querySelectorAll("[data-q-correct]").forEach(r=>{
    r.onchange = ()=>{
      const qi = Number(r.dataset.qCorrect), oi = Number(r.dataset.optIndex);
      questions[qi].correct = oi;
    };
  });
}

function validateForSave(){
  const name = $("set-name").value.trim();
  if(!name) return "Vui lòng nhập tên bộ câu hỏi.";
  if(questions.length===0) return "Cần ít nhất 1 câu hỏi.";
  for(let i=0;i<questions.length;i++){
    const q = questions[i];
    if(!q.q.trim()) return `Câu ${i+1}: chưa nhập nội dung câu hỏi.`;
    if(q.options.some(o=>!o.trim())) return `Câu ${i+1}: cần nhập đủ 4 đáp án.`;
  }
  return null;
}

async function saveSet(){
  const err = validateForSave();
  const errBox = $("editor-error");
  if(err){
    errBox.innerText = err;
    errBox.style.display = "block";
    return;
  }
  errBox.style.display = "none";

  const body = {
    name: $("set-name").value.trim(),
    duration: Number($("set-duration").value) || 20,
    questions: questions.map(q=>({ q:q.q.trim(), options:q.options.map(o=>o.trim()), correct:q.correct, explanation:(q.explanation||"").trim() })),
  };

  const url = editingId ? `${API}/${editingId}` : API;
  const method = editingId ? "PUT" : "POST";
  const res = await fetch(url, { method, headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if(!res.ok){
    const data = await res.json().catch(()=>({}));
    errBox.innerText = data.error || "Lưu thất bại, vui lòng thử lại.";
    errBox.style.display = "block";
    return;
  }
  closeEditor();
  loadSets();
}

$("btn-new-set").onclick = ()=> openEditor(null);
$("btn-add-question").onclick = ()=>{ questions.push(blankQuestion()); renderQuestions(); };
$("btn-save-set").onclick = saveSet;
$("btn-cancel-edit").onclick = closeEditor;

loadSets();
</script>
</body>
</html>
