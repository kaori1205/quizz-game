<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử trận đấu</title>
<style>
  :root{
    --bg:#FAFAFF; --panel:#FFFFFF; --panel-2:#F4F1FF; --line:rgba(36,27,77,0.10);
    --text:#241B4D; --text-dim:#6E6693; --primary:#8B5CF6; --primary-2:#A78BFA;
    --gold:#FFC93C; --teal:#12B886;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
  body{margin:0; position:relative; overflow-x:hidden; background:linear-gradient(135deg,#6D28D9 0%,#8B5CF6 45%,#A855F7 100%); color:var(--text); font-family:Arial,sans-serif; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:40px 16px 60px; padding-top:max(40px, env(safe-area-inset-top)); padding-bottom:max(60px, env(safe-area-inset-bottom)); padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right));}
  body::before{content:"";position:fixed; top:-220px; right:-160px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.16), transparent 70%); pointer-events:none;}
  body::after{content:"";position:fixed; bottom:-260px; left:-200px; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle at 70% 70%, rgba(255,255,255,0.12), transparent 70%); pointer-events:none;}
  h1,h2,h3{font-family:Arial,sans-serif;}
  .wrap{width:100%; max-width:760px; display:flex; flex-direction:column; gap:16px; position:relative; z-index:1;}
  .top{display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .logo{width:36px;height:36px;border-radius:10px; background:#fff; box-shadow:0 4px 14px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; overflow:hidden; transform:rotate(-6deg); flex-shrink:0;}
  .brand .logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .brand span{font-family:Arial,sans-serif; font-weight:700; font-size:18px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.2);}
  a.back{color:rgba(255,255,255,.85); text-decoration:none; font-weight:600; font-size:14px;}
  a.back:hover{color:#fff;}
  .card{background:var(--panel); border:none; border-radius:var(--radius); padding:clamp(16px,5vw,24px) clamp(14px,4vw,26px); box-shadow:0 24px 48px -12px rgba(30,10,70,0.35);}
  .game-row{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; padding:14px 0; border-bottom:1px solid var(--line);}
  .game-row:last-child{border-bottom:none;}
  .game-meta b{font-family:Arial,sans-serif; font-size:16px; color:var(--text);}
  .game-meta .muted{color:var(--text-dim); font-size:13px; display:block; margin-top:2px;}
  .actions{display:flex; gap:8px;}
  button, a.btn{font-family:Arial,sans-serif; font-weight:700; font-size:14px; border:none; border-radius:10px; cursor:pointer; padding:9px 14px; color:#241B4D; background:var(--gold); box-shadow:0 4px 0 0 #E0A800; text-decoration:none; display:inline-block; transition:transform .12s,box-shadow .12s;}
  button:hover, a.btn:hover{transform:translateY(-1px);}
  button:active, a.btn:active{transform:translateY(2px); box-shadow:0 1px 0 0 #E0A800;}
  button.secondary, a.btn.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--line); box-shadow:none;}
  .muted{color:var(--text-dim);}
  .table-scroll{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:14px;}
  table{width:100%; min-width:480px; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); color:var(--text); white-space:nowrap;}
  td:nth-child(3){white-space:normal; min-width:160px;}
  th{color:var(--text-dim); font-weight:600;}
  .detail{display:none; margin-top:10px;}
  .detail.open{display:block;}
  .badge-ok{color:#16A34A;} .badge-no{color:#DC2626;}
  .empty{padding:30px; text-align:center; color:var(--text-dim);}

  /* ===== Responsive: tablets & up ===== */
  @media (min-width:768px){
    .wrap{max-width:820px;}
  }
  @media (min-width:1200px){
    .wrap{max-width:900px;}
  }

  /* ===== Responsive: small phones ===== */
  @media (max-width:380px){
    body{padding:24px 10px 40px;}
    .card{padding:16px 12px;}
    .game-row{flex-direction:column; align-items:flex-start;}
    .actions{width:100%;}
    .actions button, .actions a.btn{flex:1; text-align:center;}
  }

  /* ===== Reduce decorative blobs on small screens ===== */
  @media (max-width:480px){
    body::before{width:320px; height:320px; top:-140px; right:-120px;}
    body::after{width:380px; height:380px; bottom:-160px; left:-140px;}
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo"><img src="logo.jpg" alt="Logo" onerror="this.style.display='none'"></div><span>Lịch sử trận đấu</span></div>
    <a class="back" href="/">← Về trang chủ</a>
  </div>
  <div class="card" id="list-card"><p class="muted">Đang tải…</p></div>
</div>

<script>
async function load(){
  const res = await fetch('/api/games');
  const games = await res.json();
  const card = document.getElementById('list-card');
  if(!games.length){
    card.innerHTML = '<div class="empty">Chưa có trận đấu nào được lưu lại.</div>';
    return;
  }
  card.innerHTML = games.map(g => rowHtml(g)).join('');
  games.forEach(g => {
    document.getElementById('toggle-'+g.id).onclick = () => toggleDetail(g.id);
  });
}

function rowHtml(g){
  const date = new Date(g.endedAt).toLocaleString('vi-VN');
  const top = g.topPlayer ? `Hạng nhất: ${escapeHtml(g.topPlayer.name)} (${g.topPlayer.score} điểm)` : 'Chưa có người chơi';
  return `
  <div class="game-row">
    <div class="game-meta">
      <b>Phòng ${g.roomCode}</b>
      <span class="muted">${date} · ${g.numPlayers} người chơi · ${g.numQuestions} câu · ${top}</span>
    </div>
    <div class="actions">
      <button class="secondary" id="toggle-${g.id}">Xem chi tiết</button>
      <a class="btn" href="/api/games/${g.id}/report.csv">Tải CSV</a>
    </div>
  </div>
  <div class="detail" id="detail-${g.id}"></div>
  `;
}

async function toggleDetail(id){
  const box = document.getElementById('detail-'+id);
  const isOpen = box.classList.contains('open');
  if(isOpen){ box.classList.remove('open'); box.innerHTML=''; return; }
  box.innerHTML = '<p class="muted">Đang tải chi tiết…</p>';
  box.classList.add('open');
  const res = await fetch(`/api/games/${id}/detail`);
  const g = await res.json();
  box.innerHTML = detailHtml(g);
}

function detailHtml(g){
  const ranked = g.players.slice().sort((a,b)=>b.score-a.score);
  const rankRows = ranked.map((p,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(p.name)}</td><td>${p.score}</td></tr>`).join('');
  const ansRows = g.answers.map(a=>`<tr>
    <td>${escapeHtml(a.playerName)}</td>
    <td>${a.questionIndex+1}</td>
    <td>${escapeHtml(a.questionText)}</td>
    <td>${a.choiceText?escapeHtml(a.choiceText):'<span class="muted">(không trả lời)</span>'}</td>
    <td class="${a.correct?'badge-ok':'badge-no'}">${a.correct?'Đúng':'Sai'}</td>
    <td>${a.points}</td>
    <td>${a.timeTakenMs!=null ? (a.timeTakenMs/1000).toFixed(1)+'s' : '-'}</td>
  </tr>`).join('');
  return `
  <h3>Bảng xếp hạng</h3>
  <div class="table-scroll"><table><thead><tr><th>Hạng</th><th>Tên</th><th>Điểm</th></tr></thead><tbody>${rankRows}</tbody></table></div>
  <h3>Chi tiết từng câu trả lời</h3>
  <div class="table-scroll"><table><thead><tr><th>Người chơi</th><th>Câu</th><th>Nội dung câu hỏi</th><th>Đáp án chọn</th><th>Kết quả</th><th>Điểm</th><th>Thời gian</th></tr></thead><tbody>${ansRows}</tbody></table></div>
  `;
}

function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s==null?'':s; return d.innerHTML; }

load();
</script>
</body>
</html>
