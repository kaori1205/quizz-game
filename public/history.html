<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử trận đấu — Live!Quizz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#6D28D9; --primary-2:#8B5CF6; --gold:#FFC93C;
    --text:#241B4D; --text-dim:#6B6389; --line:#E7E3F6; --panel:#FFFFFF; --panel-2:#F4F1FF;
    --red:#FF4757; --blue:#1E90FF; --yellow:#FFC107; --green:#2ED573;
    --navy:#052699;
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; min-height:100dvh; font-family:Arial,sans-serif; color:var(--text);
    background:linear-gradient(135deg,#6D28D9 0%,#8B5CF6 45%,#A855F7 100%);
    padding:32px 16px 60px; display:flex; flex-direction:column; align-items:center;
    padding-top:max(32px, env(safe-area-inset-top)); padding-bottom:max(60px, env(safe-area-inset-bottom));
    padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right));}
  .brand{display:flex; align-items:center; gap:2px; margin-bottom:22px; text-decoration:none;}
  .brand .logo{width:40px;height:40px;border-radius:11px; background:#fff; box-shadow:0 4px 18px rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center; overflow:hidden; transform:rotate(-6deg); flex-shrink:0;}
  .brand .logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .brand span.title{font-family:'Luckiest Guy',cursive; font-weight:400; font-size:22px; letter-spacing:1px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.2);}
  .brand .letter{display:inline-block;}
  .brand .letter.bang{color:var(--gold); animation:bangPulse 1.3s ease-in-out infinite; text-shadow:0 0 10px rgba(255,201,60,.7), 0 2px 10px rgba(0,0,0,.2); transform-origin:bottom center; will-change:transform;}
  @keyframes bangPulse{
    0%,60%,100%{transform:translateY(0) scale(1) rotate(0deg);}
    30%{transform:translateY(-9px) scale(1.25) rotate(8deg);}
  }
  @media (prefers-reduced-motion:reduce){
    .brand .letter.bang{animation:none;}
  }
  #wrap{width:100%; max-width:820px;}
  .top-bar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .top-bar h1{font-family:Arial,Helvetica,sans-serif; font-weight:700; letter-spacing:.3px; font-size:clamp(30px,5.4vw,42px);
    margin:0; color:#fff;
    text-shadow:-1.5px 0 0 rgba(76,29,149,.9), 1.5px 0 0 rgba(76,29,149,.9), 0 -1.5px 0 rgba(76,29,149,.9), 0 1.5px 0 rgba(76,29,149,.9),
      0 6px 14px rgba(20,10,50,.35);}
  .link-btn{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.35); padding:9px 18px;
    border-radius:999px; font-weight:700; font-size:14px; font-family:Arial,sans-serif; text-decoration:none; cursor:pointer; transition:transform .15s, background .15s;}
  .link-btn:hover{background:rgba(255,255,255,.28); transform:translateY(-2px);}
  .card{background:var(--panel); border-radius:22px; padding:24px; box-shadow:0 24px 60px rgba(30,10,60,.32);}
  .muted{color:var(--text-dim); font-size:14px;}

  .btn{border:none; border-radius:12px; padding:10px 16px; font-weight:700; font-size:14px; cursor:pointer;
    font-family:Arial,sans-serif; transition:transform .12s, box-shadow .12s; text-decoration:none; display:inline-block;}
  .btn.primary{background:var(--primary); color:#fff; box-shadow:0 5px 0 0 #4C1D95;}
  .btn.primary:hover{transform:translateY(-2px);}
  .btn.primary:active{transform:translateY(3px); box-shadow:0 1px 0 0 #4C1D95;}
  .btn.gold{background:var(--gold); color:var(--text); box-shadow:0 4px 0 0 #E0A800;}
  .btn.gold:hover{transform:translateY(-2px);}
  .btn.gold:active{transform:translateY(3px); box-shadow:0 1px 0 0 #E0A800;}
  .btn.secondary{background:var(--panel-2); color:var(--text); box-shadow:0 4px 0 0 #D8D0F5;}
  .btn.secondary:hover{background:#E9E4FB; transform:translateY(-2px);}
  .btn.secondary:active{transform:translateY(3px); box-shadow:0 1px 0 0 #D8D0F5;}
  .btn.danger{background:rgba(255,71,87,.12); color:var(--red); box-shadow:none;}
  .btn.danger:hover{background:rgba(255,71,87,.2); transform:translateY(-1px);}
  .btn.small{padding:8px 13px; font-size:13px; border-radius:9px;}

  .game-row{display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--panel-2);
    border:1px solid var(--line); border-left:5px solid var(--navy); border-radius:16px; padding:14px 16px;
    margin-bottom:10px; flex-wrap:wrap; transition:transform .12s;}
  .game-row:hover{transform:translateX(2px);}
  .game-meta{min-width:0;}
  .game-meta b{font-family:Arial,sans-serif; font-size:16px; color:var(--text);}
  .game-meta .muted{color:var(--text-dim); font-size:13px; display:block; margin-top:2px;}
  .actions{display:flex; gap:8px; flex-wrap:wrap;}

  .table-scroll{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:14px; border-radius:12px;}
  table{width:100%; min-width:480px; border-collapse:collapse; font-size:13px; font-family:Arial,sans-serif;}
  th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); color:var(--text); white-space:nowrap;}
  td:nth-child(3){white-space:normal; min-width:160px;}
  th{color:#fff; font-weight:700; background:var(--navy);}
  th:first-child{border-top-left-radius:10px;} th:last-child{border-top-right-radius:10px;}
  tbody tr:hover{background:rgba(5,38,153,.04);}
  .detail{display:none; margin-top:14px;}
  .detail.open{display:block;}
  .detail h3{font-family:Arial,sans-serif; font-size:16px; margin:16px 0 6px;}
  .badge-ok{color:#16A34A; font-weight:700;} .badge-no{color:#DC2626; font-weight:700;}
  .empty{padding:36px 12px; text-align:center; color:var(--text-dim);}

  /* ===== Responsive ===== */
  @media (min-width:768px){ #wrap{max-width:900px;} }
  @media (max-width:380px){
    .card{padding:16px 14px;}
    .game-row{flex-direction:column; align-items:flex-start;}
    .actions{width:100%;}
    .actions .btn{flex:1; text-align:center;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
</style>
</head>
<body>
  <a class="brand" href="/">
    <div class="logo"><img src="logo.jpg" alt="Live!QUIZZ logo" onerror="this.style.display='none'"></div>
    <span class="title" aria-label="Live!QUIZZ"><span class="letter">L</span><span class="letter">i</span><span class="letter">v</span><span class="letter">e</span><span class="letter bang">!</span><span class="letter">Q</span><span class="letter">U</span><span class="letter">I</span><span class="letter">Z</span><span class="letter">Z</span></span>
  </a>
  <div id="wrap">
    <div class="top-bar">
      <h1>Lịch sử trận đấu</h1>
      <a class="link-btn" href="/">← Về trang chủ</a>
    </div>
    <div class="card" id="list-card"><p class="muted">Đang tải…</p></div>
  </div>

<script>
async function load(){
  const res = await fetch('/api/games');
  const games = await res.json();
  const card = document.getElementById('list-card');
  if(!games.length){
    card.innerHTML = '<div class="empty">Chưa có trận đấu nào được lưu lại.</div>';
    return;
  }
  card.innerHTML = games.map(g => rowHtml(g)).join('');
  games.forEach(g => {
    document.getElementById('toggle-'+g.id).onclick = () => toggleDetail(g.id);
    document.getElementById('del-'+g.id).onclick = () => deleteGame(g.id);
  });
}

function rowHtml(g){
  const date = new Date(g.endedAt).toLocaleString('vi-VN');
  const top = g.topPlayer ? `Hạng nhất: ${escapeHtml(g.topPlayer.name)} (${g.topPlayer.score} điểm)` : 'Chưa có người chơi';
  return `
  <div class="game-row">
    <div class="game-meta">
      <b>Phòng ${g.roomCode}</b>
      <span class="muted">${date} · ${g.numPlayers} người chơi · ${g.numQuestions} câu · ${top}</span>
    </div>
    <div class="actions">
      <button class="btn secondary small" id="toggle-${g.id}">Xem chi tiết</button>
      <a class="btn gold small" href="/api/games/${g.id}/report.csv">Tải CSV</a>
      <button class="btn danger small" id="del-${g.id}">Xoá</button>
    </div>
  </div>
  <div class="detail" id="detail-${g.id}"></div>
  `;
}

async function toggleDetail(id){
  const box = document.getElementById('detail-'+id);
  const isOpen = box.classList.contains('open');
  if(isOpen){ box.classList.remove('open'); box.innerHTML=''; return; }
  box.innerHTML = '<p class="muted">Đang tải chi tiết…</p>';
  box.classList.add('open');
  const res = await fetch(`/api/games/${id}/detail`);
  const g = await res.json();
  box.innerHTML = detailHtml(g);
}

async function deleteGame(id){
  if(!confirm('Xoá lịch sử trận đấu này? Không thể hoàn tác.')) return;
  const res = await fetch(`/api/games/${id}`, { method:'DELETE' });
  if(res.ok) load();
  else alert('Xoá thất bại, vui lòng thử lại.');
}

function detailHtml(g){
  const ranked = g.players.slice().sort((a,b)=>b.score-a.score);
  const rankRows = ranked.map((p,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(p.name)}</td><td>${p.score}</td></tr>`).join('');
  const ansRows = g.answers.map(a=>`<tr>
    <td>${escapeHtml(a.playerName)}</td>
    <td>${a.questionIndex+1}</td>
    <td>${escapeHtml(a.questionText)}</td>
    <td>${a.choiceText?escapeHtml(a.choiceText):'<span class="muted">(không trả lời)</span>'}</td>
    <td class="${a.correct?'badge-ok':'badge-no'}">${a.correct?'Đúng':'Sai'}</td>
    <td>${a.points}</td>
    <td>${a.timeTakenMs!=null ? (a.timeTakenMs/1000).toFixed(1)+'s' : '-'}</td>
  </tr>`).join('');
  return `
  <h3>Bảng xếp hạng</h3>
  <div class="table-scroll"><table><thead><tr><th>Hạng</th><th>Tên</th><th>Điểm</th></tr></thead><tbody>${rankRows}</tbody></table></div>
  <h3>Chi tiết từng câu trả lời</h3>
  <div class="table-scroll"><table><thead><tr><th>Người chơi</th><th>Câu</th><th>Nội dung câu hỏi</th><th>Đáp án chọn</th><th>Kết quả</th><th>Điểm</th><th>Thời gian</th></tr></thead><tbody>${ansRows}</tbody></table></div>
  `;
}

function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s==null?'':s; return d.innerHTML; }

load();
</script>
</body>
</html>
