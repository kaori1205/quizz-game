<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử trận đấu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12102B; --panel:#1E1B4B; --panel-2:#262261; --line:rgba(255,255,255,0.08);
    --text:#F4F2FF; --text-dim:#A9A4D9; --primary:#7C5CFC; --gold:#FFC93C; --teal:#2DD4BF;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:radial-gradient(1200px 600px at 50% -10%, #29236b 0%, var(--bg) 60%); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px;}
  h1,h2,h3{font-family:'Fredoka',sans-serif;}
  .wrap{width:100%; max-width:760px; display:flex; flex-direction:column; gap:16px;}
  .top{display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .logo{width:30px;height:30px;border-radius:8px; background:conic-gradient(from 220deg,#E5484D,#EAB308,#22C55E,#3B82F6,#E5484D);}
  .brand span{font-family:'Fredoka'; font-weight:700; font-size:18px;}
  a.back{color:var(--text-dim); text-decoration:none; font-weight:600; font-size:14px;}
  a.back:hover{color:var(--text);}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2)); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px;}
  .game-row{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; padding:14px 0; border-bottom:1px solid var(--line);}
  .game-row:last-child{border-bottom:none;}
  .game-meta b{font-family:'Fredoka'; font-size:16px;}
  .game-meta .muted{color:var(--text-dim); font-size:13px; display:block; margin-top:2px;}
  .actions{display:flex; gap:8px;}
  button, a.btn{font-family:'Fredoka'; font-weight:600; font-size:14px; border:none; border-radius:10px; cursor:pointer; padding:9px 14px; color:#12102B; background:var(--gold); text-decoration:none; display:inline-block;}
  button.secondary, a.btn.secondary{background:transparent; color:var(--text); border:1px solid var(--line);}
  .muted{color:var(--text-dim);}
  table{width:100%; border-collapse:collapse; margin-top:14px; font-size:13px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--line);}
  th{color:var(--text-dim); font-weight:600;}
  .detail{display:none; margin-top:10px;}
  .detail.open{display:block;}
  .badge-ok{color:#4ADE80;} .badge-no{color:#F87171;}
  .empty{padding:30px; text-align:center; color:var(--text-dim);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo"></div><span>Lịch sử trận đấu</span></div>
    <a class="back" href="/">← Về trang chủ</a>
  </div>
  <div class="card" id="list-card"><p class="muted">Đang tải…</p></div>
</div>

<script>
async function load(){
  const res = await fetch('/api/games');
  const games = await res.json();
  const card = document.getElementById('list-card');
  if(!games.length){
    card.innerHTML = '<div class="empty">Chưa có trận đấu nào được lưu lại.</div>';
    return;
  }
  card.innerHTML = games.map(g => rowHtml(g)).join('');
  games.forEach(g => {
    document.getElementById('toggle-'+g.id).onclick = () => toggleDetail(g.id);
  });
}

function rowHtml(g){
  const date = new Date(g.endedAt).toLocaleString('vi-VN');
  const top = g.topPlayer ? `🏆 ${escapeHtml(g.topPlayer.name)} (${g.topPlayer.score} điểm)` : 'Chưa có người chơi';
  return `
  <div class="game-row">
    <div class="game-meta">
      <b>Phòng ${g.roomCode}</b>
      <span class="muted">${date} · ${g.numPlayers} người chơi · ${g.numQuestions} câu · ${top}</span>
    </div>
    <div class="actions">
      <button class="secondary" id="toggle-${g.id}">Xem chi tiết</button>
      <a class="btn" href="/api/games/${g.id}/report.csv">📥 Tải CSV</a>
    </div>
  </div>
  <div class="detail" id="detail-${g.id}"></div>
  `;
}

async function toggleDetail(id){
  const box = document.getElementById('detail-'+id);
  const isOpen = box.classList.contains('open');
  if(isOpen){ box.classList.remove('open'); box.innerHTML=''; return; }
  box.innerHTML = '<p class="muted">Đang tải chi tiết…</p>';
  box.classList.add('open');
  const res = await fetch(`/api/games/${id}/detail`);
  const g = await res.json();
  box.innerHTML = detailHtml(g);
}

function detailHtml(g){
  const ranked = g.players.slice().sort((a,b)=>b.score-a.score);
  const rankRows = ranked.map((p,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(p.name)}</td><td>${p.score}</td></tr>`).join('');
  const ansRows = g.answers.map(a=>`<tr>
    <td>${escapeHtml(a.playerName)}</td>
    <td>${a.questionIndex+1}</td>
    <td>${escapeHtml(a.questionText)}</td>
    <td>${a.choiceText?escapeHtml(a.choiceText):'<span class="muted">(không trả lời)</span>'}</td>
    <td class="${a.correct?'badge-ok':'badge-no'}">${a.correct?'Đúng':'Sai'}</td>
    <td>${a.points}</td>
    <td>${a.timeTakenMs!=null ? (a.timeTakenMs/1000).toFixed(1)+'s' : '-'}</td>
  </tr>`).join('');
  return `
  <h3>Bảng xếp hạng</h3>
  <table><thead><tr><th>Hạng</th><th>Tên</th><th>Điểm</th></tr></thead><tbody>${rankRows}</tbody></table>
  <h3>Chi tiết từng câu trả lời</h3>
  <table><thead><tr><th>Người chơi</th><th>Câu</th><th>Nội dung câu hỏi</th><th>Đáp án chọn</th><th>Kết quả</th><th>Điểm</th><th>Thời gian</th></tr></thead><tbody>${ansRows}</tbody></table>
  `;
}

function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s==null?'':s; return d.innerHTML; }

load();
</script>
</body>
</html>
